<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA Meta Tags -->
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Archery Club">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

    <title>Archery Club Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a227;
            --gold-light: #f0c040;
            --dark: #0f0f0f;
            --dark2: #1a1a1a;
            --dark3: #242424;
            --dark4: #2e2e2e;
            --border: #3a3a3a;
            --text: #e8e0d0;
            --muted: #888;
            --success: #3d9970;
            --danger: #c0392b;
            --info: #2980b9;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
        }
        h1, h2, h3, .display { font-family: 'Rajdhani', sans-serif; }

        /* ── BACKGROUND TEXTURE ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,162,39,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(201,162,39,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── INPUTS ── */
        .inp {
            background: var(--dark3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.65rem 0.9rem;
            border-radius: 8px;
            width: 100%;
            font-family: 'Exo 2', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .inp:focus { outline: none; border-color: var(--gold); }
        .inp::placeholder { color: #555; }
        select.inp { cursor: pointer; }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
            padding: 0.65rem 1.2rem; border-radius: 8px;
            font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700;
            cursor: pointer; border: none; transition: all 0.15s;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
            letter-spacing: 0.02em;
        }
        .btn-gold { background: var(--gold); color: #0f0f0f; }
        .btn-gold:hover { background: var(--gold-light); transform: scale(1.02); }
        .btn-gold:active { transform: scale(0.98); }
        .btn-outline { background: transparent; color: var(--gold); border: 1.5px solid var(--gold); }
        .btn-outline:hover { background: rgba(201,162,39,0.08); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #e74c3c; }
        .btn-ghost { background: var(--dark3); color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
        .btn-success { background: var(--success); color: white; }
        .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.85rem; }
        .btn-lg { padding: 0.85rem 1.6rem; font-size: 1.1rem; min-height: 52px; }
        .btn-full { width: 100%; }

        /* ── CARDS ── */
        .card {
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.2rem;
        }
        .card-gold { border-color: var(--gold); }
        .card-hover { cursor: pointer; transition: all 0.2s; }
        .card-hover:hover { border-color: var(--gold); background: var(--dark3); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,162,39,0.1); }

        /* ── GOLD DIVIDER ── */
        .gold-line { height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 1.2rem 0; }

        /* ── BADGE ── */
        .badge { display: inline-block; padding: 0.2rem 0.7rem; border-radius: 99px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
        .badge-gold { background: rgba(201,162,39,0.15); color: var(--gold-light); border: 1px solid rgba(201,162,39,0.3); }
        .badge-green { background: rgba(61,153,112,0.15); color: #5dba94; border: 1px solid rgba(61,153,112,0.3); }
        .badge-blue { background: rgba(41,128,185,0.15); color: #5daadc; border: 1px solid rgba(41,128,185,0.3); }
        .badge-red { background: rgba(192,57,43,0.15); color: #e07060; border: 1px solid rgba(192,57,43,0.3); }

        /* ── TABS ── */
        .tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        .tab { flex: 1; padding: 0.6rem 0.5rem; text-align: center; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.9rem; transition: all 0.15s; color: var(--muted); background: var(--dark2); border: none; letter-spacing: 0.02em; }
        .tab.active { background: var(--gold); color: #0f0f0f; }
        .tab:not(.active):hover { background: var(--dark3); color: var(--text); }

        /* ── MODAL ── */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
        #modal-overlay.show { display: flex; }
        .modal-box { background: var(--dark2); border: 1.5px solid var(--gold); border-radius: 16px; padding: 1.5rem; max-width: 440px; width: 100%; max-height: 90vh; overflow-y: auto; }

        /* ── STAT BOX ── */
        .stat-box { background: var(--dark3); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem 1rem; text-align: center; }
        .stat-num { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--gold-light); line-height: 1; }
        .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }

        /* ── HEADER ── */
        .app-header { background: var(--dark2); border-bottom: 1px solid var(--border); padding: 0.75rem 1rem; display: flex; align-items: center; gap: 0.75rem; position: sticky; top: 0; z-index: 100; }
        .app-header .logo-text { font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--gold); letter-spacing: 0.04em; line-height: 1; }
        .app-header .sub-text { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }

        /* ── ARCHER AVATAR ── */
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--dark3); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); flex-shrink: 0; }
        .avatar-lg { width: 64px; height: 64px; font-size: 1.5rem; }
        .avatar-xl { width: 80px; height: 80px; font-size: 2rem; }

        /* ── ASD CARD (login screen) ── */
        .asd-tile { background: var(--dark2); border: 1.5px solid var(--border); border-radius: 16px; padding: 1.4rem 1rem; cursor: pointer; transition: all 0.2s; text-align: center; }
        .asd-tile:hover { border-color: var(--gold); background: var(--dark3); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(201,162,39,0.12); }
        .asd-logo-wrap { width: 72px; height: 72px; border-radius: 50%; background: var(--dark3); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; margin: 0 auto 0.75rem; overflow: hidden; }
        .asd-logo-wrap img { width: 100%; height: 100%; object-fit: cover; }

        /* ── MESSAGE BUBBLES ── */
        .msg-sent { background: rgba(201,162,39,0.12); border: 1px solid rgba(201,162,39,0.25); border-radius: 12px 12px 4px 12px; padding: 0.6rem 0.9rem; margin-left: auto; max-width: 85%; }
        .msg-recv { background: var(--dark3); border: 1px solid var(--border); border-radius: 12px 12px 12px 4px; padding: 0.6rem 0.9rem; max-width: 85%; }

        /* ── SCORE GRID ── */
        .score-tbl th, .score-tbl td { border: 1px solid var(--border); padding: 0.35rem 0.4rem; text-align: center; font-size: 0.82rem; }
        .score-tbl th { background: var(--dark3); color: var(--gold); font-family: 'Rajdhani', sans-serif; }

        /* ── ANIMATIONS ── */
        @keyframes fadeSlide { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
        .anim { animation: fadeSlide 0.28s ease both; }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            .stat-num { font-size: 1.4rem; }
            input, select, textarea { font-size: 16px !important; }
        }

        /* ── NAV DRAWER ── */
        #nav-drawer { position: fixed; top: 0; left: 0; height: 100%; width: 280px; background: var(--dark2); border-right: 1px solid var(--border); z-index: 150; transform: translateX(-100%); transition: transform 0.3s ease; overflow-y: auto; }
        #nav-drawer.open { transform: translateX(0); }
        #nav-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 149; }
        #nav-overlay.show { display: block; }
        .nav-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.75rem 1rem; border-radius: 8px; cursor: pointer; transition: all 0.15s; font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.95rem; color: var(--muted); letter-spacing: 0.02em; }
        .nav-item:hover { background: var(--dark3); color: var(--text); }
        .nav-item.active { background: rgba(201,162,39,0.12); color: var(--gold); }

        /* ── LOADING ── */
        .spinner { width: 40px; height: 40px; border: 3px solid var(--dark3); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── FORM SECTION ── */
        .form-section { background: var(--dark3); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.78rem; color: var(--gold); font-weight: 600; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.04em; }

        /* ── SESSION CARD ── */
        .session-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; transition: border-color 0.2s; }
        .session-card:hover { border-color: rgba(201,162,39,0.4); }

        /* ── UTILITIES ── */
        .w-full { width: 100%; }
        .border-collapse { border-collapse: collapse; }
        .col-span-2 { grid-column: span 2 / span 2; }
    
    /* Offset header per barra offline */
    body.is-offline .app-header { top: 32px; }
    body.is-offline #content-view { padding-top: calc(var(--header-h) + 32px); }
</style>
</head>
<body>

<!-- NAV OVERLAY -->
<div id="nav-overlay" onclick="closeNav()"></div>

<!-- NAV DRAWER -->
<div id="nav-drawer">

<!-- TARGET OVERLAY -->
<div id="target-overlay" style="display:none;position:fixed;inset:0;z-index:500;background:#0f172a;overflow-y:auto;padding:12px 12px 80px">
    <div style="position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;background:#0f172a;padding:8px 0 10px;border-bottom:1px solid #334155;margin-bottom:12px">
        <button onclick="window.closeTargetOverlay()" style="display:flex;align-items:center;gap:6px;padding:8px 14px;background:#1e293b;color:#fff;font-weight:700;border:1px solid #475569;border-radius:10px;cursor:pointer;font-size:13px">← Segnapunti</button>
        <span id="overlay-turn-info" style="color:#fdb927;font-size:14px;font-weight:700"></span>

    </div>
    <div id="target-overlay-content"></div>

<!-- MODAL -->
<div id="modal-overlay">
    <div class="modal-box">
        <h3 id="modal-title" style="font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--gold);margin-bottom:0.75rem"></h3>

// Carica sessioni solo se necessario
async function loadAtletaSessioniCached(forceReload = false) {
    const CACHE_TTL = 60000; // 1 minuto
    const now = Date.now();
    const cacheValid = S.cache.sessioniLoadedAt &&
                       (now - S.cache.sessioniLoadedAt) < CACHE_TTL &&
                       S.sessioni.length > 0;

    }

const render = html => { $('main-view').innerHTML = `<div class="anim">${html}</div>`; };
function showModal(title, bodyHtml, actions=[]) {
    $('modal-title').textContent = title;
    $('modal-body').innerHTML = bodyHtml;
    $('modal-actions').innerHTML = '';
    actions.forEach(a => {
        const b = document.createElement('button');

    });

function closeModal() { $('modal-overlay').classList.remove('show'); }
async function hashPwd(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password + '_ACM_SALT_2025');
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return 'sha_' + hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function fmtDate(d) {
    if (!d) return 'N/D';
    let s = '';
    if (typeof d === 'string') {
        s = d;
    } else if (d instanceof Date) {
        s = d.toISOString().split('T')[0];
    } else if (typeof d === 'object' && d.seconds) {
        s = new Date(d.seconds * 1000).toISOString().split('T')[0];
    } else {
        return String(d);
    }
    const p = s.split('-');
    return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : s;
}
function initials(nome, cognome) {
    return ((nome||'?')[0] + (cognome||'?')[0]).toUpperCase();

window.toggleNav = () => { $('nav-drawer').classList.toggle('open'); $('nav-overlay').classList.toggle('show'); };
window.closeNav  = () => { $('nav-drawer').classList.remove('open'); $('nav-overlay').classList.remove('show'); };

function setHeader(title, sub='', rightHtml='') {
    $('app-header').style.display = 'flex';
    $('header-title').textContent = title;
    $('header-sub').textContent = sub;
    $('header-right').innerHTML = rightHtml;
    // Mostra freccia indietro se c'è storia di navigazione

function hideHeader() {
    $('app-header').style.display = 'none';

onAuthStateChanged(auth, async user => {
    if (!user) {
        await signInAnonymously(auth);
        return;
    }

    await loadAllAsd();

    if (!user.isAnonymous) {
        // Possibile ASD loggata
        const asdSnap = await getDoc(doc(db, `${APP_NS}/data/asd`, user.uid));
        if (asdSnap.exists()) {
            S.role = 'asd';
            S.asd = { id: asdSnap.id, ...asdSnap.data() };
            await loadAtleti();
            buildNav();
            window.setView('asdDashboard');
            return;
        }
    }

    // Se arriviamo qui, o è anonimo o non è una ASD (magari sessione atleta persistente?)
    // Per ora, l'atleta usa ancora il login "legacy" basato su localStorage per la sessione,
    // ma verifichiamo se c'è un match in localStorage
    const atlSess = localStorage.getItem('acm_atleta_session');
    if (atlSess) {
        try {
            const { asdId, atletaId } = JSON.parse(atlSess);
            const asd = S.allAsd.find(a => a.id === asdId);
            if (asd) {
                const atlSnap = await getDoc(doc(db, `${APP_NS}/data/asd/${asdId}/atleti`, atletaId));
                if (atlSnap.exists()) {
                    S.role = 'atleta';
                    S.asd = asd;
                    S.atleta = { id: atlSnap.id, ...atlSnap.data() };
                    buildNav();
                    window.setView('atletaMenu');
                    return;
                }
            }
        } catch(e) {}
    }

    window.setView('homeLogin');
});

async function loadAllAsd() {
    try {
        const snap = await getDocs(asdCol());
        S.allAsd = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) { S.allAsd = []; }
}

// ── VIEWS ROUTER ────────────────────────────────────────────────────────────
// Stack di navigazione per il tasto indietro
window._navHistory = [];
window._navGoBack = () => {
    if (window._navHistory.length > 1) {
        window._navHistory.pop(); // rimuovi corrente
        const prev = window._navHistory.pop(); // prendi precedente
        window.setView(prev.view, prev.params);
    } else {
        // fallback intelligente
        if (S.role === 'atleta') window.setView('atletaMenu');
        else if (S.role === 'asd') window.setView('asdDashboard');
        else window.setView('homeLogin');
    }
};

window.setView = async (view, params={}) => {
    S.view = view;
    // Aggiungi allo stack (evita duplicati consecutivi)
    const last = window._navHistory[window._navHistory.length-1];
    if (!last || last.view !== view) {
        window._navHistory.push({view, params});
        if (window._navHistory.length > 20) window._navHistory.shift();
    }
    closeNav();
    switch(view) {
        case 'homeLogin':       return renderHomeLogin();
        case 'asdLogin':        return renderAsdLogin(params);
        case 'asdRegister':     return renderAsdRegister();
        case 'asdDashboard':    return renderAsdDashboard();
        case 'asdAtleti':       return renderAsdAtleti();
        case 'asdStats':        return renderAsdStats(params);
        case 'asdAtletaDetail': return renderAsdAtletaDetail(params);
        case 'asdMessaggi':     return renderAsdMessaggi();
        case 'asdProfilo':      return renderAsdProfilo();
        case 'atletaSelect':    return renderAtletaSelect(params);
        case 'atletaLogin':     return renderAtletaLogin(params);
        case 'atletaMenu':
            if (!S.sessioni || S.sessioni.length === 0) await loadAtletaSessioni();
            return renderAtletaMenu();
        case 'atletaDati':      return renderAtletaDati();
        case 'atletaMessaggi':  return renderAtletaMessaggi();
        // Tracker views (atleta)
        case 'registrationForm':return renderRegistrationForm(params);
        case 'trainingNotes':   return renderTrainingNotes();
        case 'scoring':         return tkRenderScoring();
        case 'quickScore':      return renderQuickScoreView();
        case 'dataSummary':        return renderAtletaDati();
        case 'detailedSummary':    return renderDettaglioSessione(params);
        case 'atletaCalendario':   return renderAtletaCalendario();
        case 'atletaMateriale':
            const eqSnap = await getDoc(equipmentRef(S.asd.id, S.atleta.id));
            S.equipment = eqSnap.exists() ? eqSnap.data() : getEquipment(); // fallback to local
            window._eqEditMode = false;
            return renderAtletaMateriale();
        case 'msgTraAsd':          return renderMsgTraAsd();
        case 'asdMessaggiEsterni': return renderAsdMessaggiEsterni();
        case 'asdRecords':         return renderAsdRecords();
        case 'targetStats':        return renderTargetStats();
        case 'atletaObiettivi':    return renderAtletaObiettivi();
        case 'confrontaSessioni':  return renderConfronta();
        case 'contatoreFrecce':    return renderContatoreFrecce();
        case 'esportaDati':        return renderEsportaDati();
        case 'atletaGrafici':      return window.renderAtletaGrafici();
        case 'impostazioni':       return renderImpostazioni();
        case 'masterPanel':        return window._masterLogged?renderMasterPanel():window.setView('homeLogin');
        case 'coachDashboard': return renderCoachDashboard();
       case 'coachAtleti':    return renderCoachAtleti();
       case 'coachMessaggi':  return renderCoachMessaggi();
        default: renderHomeLogin();
    }
};

window._masterAuth = async () => {
    const pwd = document.getElementById('master-pwd')?.value || '';
    if (!pwd) return;
    try {
        const masterSnap = await getDoc(doc(db, 'club_manager_v1_config', 'master'));
        if (!masterSnap.exists()) {
            showModal('❌ Errore', 'Configurazione master non trovata.', [{text:'OK'}]);
            return;
        }
        const storedHash = masterSnap.data()?.hash;
        const inputHash = await hashPwd(pwd);
        console.log('storedHash:', storedHash);
        console.log('inputHash:', inputHash);
        if (inputHash !== storedHash) {
            await new Promise(r => setTimeout(r, 1500));
            showModal('❌ Accesso Negato', 'Chiave non valida.', [{text:'OK'}]);
            return;
        }
        window._masterLogged = true;
        await loadAllAsd();
        window.setView('masterPanel');
    } catch(e) {
        showModal('❌ Errore', 'Impossibile verificare: ' + e.message, [{text:'OK'}]);
    }
};

window._migLoadAtleti = async (asdId) => {
    if (!asdId) return;

window._migFileLoad = () => {
    const file = document.getElementById('mig-file')?.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        const ta = document.getElementById('mig-json');
        if (ta) ta.value = e.target.result;
    };

window._migExecute = async () => {
    const asdId   = document.getElementById('mig-asd')?.value;
    const atletaId= document.getElementById('mig-atleta')?.value;
    const jsonTxt = document.getElementById('mig-json')?.value?.trim();

    if (!asdId)    return showModal('Errore','Seleziona una ASD.',[{text:'OK',fn:window._masterMigrazione}]);
    if (!atletaId) return showModal('Errore','Seleziona un atleta.',[{text:'OK',fn:window._masterMigrazione}]);
    if (!jsonTxt)  return showModal('Errore','Inserisci il JSON.',[{text:'OK',fn:window._masterMigrazione}]);

    let rawData;
    try { rawData = JSON.parse(jsonTxt); }
    catch(e) { return showModal('Errore JSON', 'Il testo incollato non è un JSON valido: '+e.message, [{text:'OK',fn:window._masterMigrazione}]); }

    // Carica info atleta destinatario
    const atlSnap = await getDocs(atletiCol(asdId));
    const atleta  = atlSnap.docs.map(d=>({id:d.id,...d.data()})).find(a=>a.id===atletaId);
    if (!atleta) return showModal('Errore','Atleta non trovato.',[{text:'OK'}]);

    // ── Normalizza il JSON dalla vecchia app ──
    // La vecchia app può avere diverse strutture:
    // 1. Array di sessioni diretto: [{type, data, totalScore, ...}, ...]
    // 2. Oggetto con chiave "sessions": {sessions: [...]}
    // 3. Oggetto con chiave "data": {data: {sessions: [...]}}
    // 4. Struttura Firebase export con archers: [{sessions:[...]}]
    let sessions = [];
    if (Array.isArray(rawData)) {
        sessions = rawData;
    } else if (Array.isArray(rawData.sessions)) {
        sessions = rawData.sessions;
    } else if (rawData.data && Array.isArray(rawData.data.sessions)) {
        sessions = rawData.data.sessions;
    } else if (rawData.data && Array.isArray(rawData.data)) {
        sessions = rawData.data;
    } else if (Array.isArray(rawData.archers)) {
        // Struttura con archers: prendi le sessioni di tutti
        rawData.archers.forEach(a => { if (Array.isArray(a.sessions)) sessions.push(...a.sessions); });
    } else {
        // Prova a cercare ricorsivamente array di sessioni
        const findSessions = (obj) => {
            if (!obj || typeof obj !== 'object') return [];
            if (Array.isArray(obj)) {
                if (obj.length > 0 && (obj[0].type || obj[0].totalScore || obj[0].data)) return obj;
                for (const item of obj) { const r = findSessions(item); if (r.length) return r; }
            }
            for (const key of Object.keys(obj)) {
                const r = findSessions(obj[key]);
                if (r.length) return r;
            }
            return [];
        };
        sessions = findSessions(rawData);
    }

    if (!sessions.length) {
        return showModal('Nessuna Sessione', 'Non sono state trovate sessioni nel JSON fornito. Verifica che sia il backup corretto della vecchia app.', [{text:'OK',fn:window._masterMigrazione}]);
    }

    // ── Mostra anteprima e chiedi conferma ──
    const tipiCount = {};
    sessions.forEach(s => { const t = s.type||'Allenamento'; tipiCount[t]=(tipiCount[t]||0)+1; });
    const riepilogo = Object.entries(tipiCount).map(([t,n])=>`${n} ${t}`).join(', ');

    showModal('📋 Anteprima Migrazione', `
        <div style="font-size:0.85rem;display:flex;flex-direction:column;gap:0.5rem">
            <div style="background:var(--dark3);border-radius:8px;padding:0.65rem">
                <div><strong style="color:var(--gold)">Sessioni trovate:</strong> ${sessions.length}</div>
                <div><strong style="color:var(--gold)">Riepilogo:</strong> ${riepilogo}</div>
                <div><strong style="color:var(--gold)">Destinatario:</strong> ${atleta.nome} ${atleta.cognome}</div>
            </div>
            <p style="color:var(--muted);font-size:0.78rem">Le sessioni verranno aggiunte al profilo dell'atleta selezionato. I dati esistenti non vengono eliminati.</p>
        </div>
    `, [
        {text:'Annulla', cls:'btn-ghost'},
        {text:`✅ Importa ${sessions.length} sessioni`, cls:'btn-gold', fn: async () => {
            await _migImportSessions(asdId, atletaId, atleta, sessions);
        }}
    ]);
};

async function _migImportSessions(asdId, atletaId, atleta, sessions) {
    let ok = 0, fail = 0;
    const col = sessioniCol(asdId);

    // Mostra progresso
    showModal('⏳ Importazione...', `<div id="mig-progress" style="text-align:center;padding:1rem">
        <div style="font-size:1.5rem;margin-bottom:0.5rem">⏳</div>
        <div id="mig-prog-txt" style="color:var(--muted)">Inizio importazione...</div>
    </div>`, []);

    for (const s of sessions) {
        try {
            // Mappa i campi dalla vecchia struttura alla nuova
            const mapped = _migMapSession(s, atletaId, atleta);
            await addDoc(col, mapped);
            ok++;
            const el = document.getElementById('mig-prog-txt');
            if (el) el.textContent = `Importate ${ok}/${sessions.length} sessioni...`;
        } catch(e) {
            fail++;
        }
    }

    closeModal();
    showModal(ok>0?'✅ Importazione Completata!':'⚠️ Importazione Fallita', `
        <div style="text-align:center;font-size:0.9rem">
            <div style="font-size:2rem;margin-bottom:0.5rem">${ok>0?'✅':'❌'}</div>
            <div><strong style="color:var(--gold)">${ok}</strong> sessioni importate con successo</div>
            ${fail>0?`<div style="color:var(--danger);margin-top:0.3rem">${fail} sessioni non importate (errore)</div>`:''}
            <p style="font-size:0.78rem;color:var(--muted);margin-top:0.5rem">Le sessioni sono ora visibili nel profilo atleta.</p>
        </div>
    `, [{text:'OK', cls:'btn-gold', fn:()=>window.setView('masterPanel')}]);
}

function _migMapSession(s, atletaId, atleta) {
    // Mappa dai campi della vecchia app ai campi della nuova
    // La vecchia app usa: type, date/data, score/totalScore, location/luogo, arrows, distance/distanza, target/tipoTarga ecc.
    const data = s.date || s.data || s.createdAt?.split?.('T')?.[0] || new Date().toISOString().split('T')[0];
    const type = s.type === 'competition' ? 'Gara' : s.type === 'training' ? 'Allenamento' : (s.type || 'Allenamento');
    const totalScore = parseInt(s.totalScore || s.score || s.total || 0) || 0;
    const t1 = parseInt(s.turn1Score || s.t1Score || s.round1 || 0) || 0;
    const t2 = parseInt(s.turn2Score || s.t2Score || s.round2 || 0) || 0;
    return {
        archerId:    atletaId,
        arciere:     `${atleta.nome} ${atleta.cognome}`,
        type,
        data,
        luogo:       s.location || s.luogo || s.place || '',
        tipoLuogo:   s.tipoLuogo || s.locationType || '',
        distanza:    s.distance || s.distanza || s.dist || '',
        tipoTarga:   s.target || s.tipoTarga || s.targetType || '',
        formatoGara: s.formatoGara || s.format || s.formato || '',
        tipoArco:    s.bowType || s.tipoArco || s.arco || atleta.tipoArco || '',
        totalScore,
        turn1Score:  t1,
        turn2Score:  t2,
        totalX:      parseInt(s.totalX || s.xCount || 0) || 0,
        totalTen:    parseInt(s.totalTen || s.tenCount || 0) || 0,
        totalNine:   parseInt(s.totalNine || s.nineCount || 0) || 0,
        totalAverage:parseFloat(s.totalAverage || s.average || s.avg || 0) || 0,
        frecceAggiuntive: parseInt(s.frecceAggiuntive || s.arrows || s.arrowCount || 0) || 0,
        frecceProgrammate:parseInt(s.frecceProgrammate || 0) || 0,
        esercizConsigliati: s.esercizConsigliati || s.exercises || s.notes || '',
        esercizSvolti:      s.esercizSvolti || s.exercisesDone || '',
        noteCondizioniFisiche: s.noteCondizioniFisiche || s.physicalNotes || '',
        notePreGara:  s.notePreGara || s.preNotes || '',
        notePostGara: s.notePostGara || s.postNotes || '',
        trainingWithoutScore: s.trainingWithoutScore !== undefined ? s.trainingWithoutScore : (type==='Allenamento' && totalScore===0 && !s.quickScore),
        quickScore:   !!s.quickScore,
        turn1: s.turn1 || s.round1_data || null,
        turn2: s.turn2 || s.round2_data || null,
        arrowPositions: s.arrowPositions || s.arrows_positions || [],
        volleyNotes: s.volleyNotes || s.volleys_notes || {},
        ora: s.ora || s.time || s.hour || '',
        migrated:     true,
        migratedAt:   new Date().toISOString(),
        createdAt:    s.createdAt || new Date().toISOString(),
        timestamp:    serverTimestamp()
    };
}

window.doAsdRegister = async function() {
    const nome  = $('reg-nome')?.value.trim();
    const email = $('reg-email')?.value.trim();
    const user  = $('reg-user')?.value.trim().toLowerCase();
    const admin = $('reg-admin')?.value.trim();
    const citta = $('reg-citta')?.value.trim();
    const pwd   = $('reg-pwd')?.value.trim();
    const pwd2  = $('reg-pwd2')?.value.trim();

    if (!nome)  return showModal('Errore','Inserisci il nome della ASD.',[{text:'OK'}]);
    if (!email) return showModal('Errore','Inserisci l\'email responsabile.',[{text:'OK'}]);
    if (!user)  return showModal('Errore','Inserisci lo User ASD.',[{text:'OK'}]);
    if (!admin) return showModal('Errore','Inserisci il Nome Amministratore.',[{text:'OK'}]);
    if (!pwd)   return showModal('Errore','Inserisci una password.',[{text:'OK'}]);
    if (pwd.length < 6) return showModal('Errore','Password minimo 6 caratteri.',[{text:'OK'}]);
    if (pwd !== pwd2)   return showModal('Errore','Le password non coincidono.',[{text:'OK'}]);

    await loadAllAsd();
    if (S.allAsd.find(a => (a.username||'').toLowerCase() === user)) {
        return showModal('Errore','Esiste già una ASD con questo User.',[{text:'OK'}]);
    }

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, pwd);
        const uid = userCredential.user.uid;

        const newAsd = {
            nome,
            username: user,
            adminName: admin,
            email,
            citta: citta||'',
            logoUrl: '',
            createdAt: new Date().toISOString()
        };

        await setDoc(doc(db, `${APP_NS}/data/asd`, uid), newAsd);
        newAsd.id = uid;
        S.allAsd.push(newAsd);
        S.role   = 'asd';
        S.asd    = newAsd;
        S.atleti = [];
        buildNav();
        showModal('✅ ASD Creata!', `Benvenuto <strong>${nome}</strong>!<br>Il profilo ASD è stato creato con successo.`, [{
            text: 'Vai alla Dashboard', cls: 'btn-gold', fn: () => window.setView('asdDashboard')
        }]);
    } catch(e) {
        console.error(e);
        showModal('Errore', 'Errore durante la creazione: ' + e.message, [{text:'OK'}]);
    }
}

async function loadAtleti() {
    if (!S.asd?.id) return;
    const snap = await getDocs(atletiCol(S.asd.id));
    const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Memorizza tutti i tecnici per i dropdown di assegnazione
    S.allTecnici = all.filter(a => a.isTecnico);

    // Logica a tre livelli:
    // - Account ASD → tutto
    // - Atleta con isAdmin o nome corrispondente adminName → tutto
    // - Coach puro (isTecnico senza isAdmin) → solo propri atleti assegnati + sé stesso
    const isFullAdmin = S.role === 'asd' || isAtletaAdmin();
    const isCoachOnly = S.role === 'atleta' && S.atleta?.isTecnico && !isFullAdmin;

    if (isCoachOnly) {
        S.atleti = all.filter(a => a.tecnicoId === S.atleta.id || a.id === S.atleta.id);
    } else {
        S.atleti = all;
    }
}

async function saveAtleta(existingId=null, existingData=null) {
    const nome            = $('atl-nome')?.value.trim();
    const cognome         = $('atl-cognome')?.value.trim();
    const tesseraFitarco  = $('atl-tessera-fitarco')?.value.trim();
    const tesseraAltro    = $('atl-tessera-altro')?.value.trim();
    const enteAltro       = $('atl-ente-altro')?.value.trim();
    const nascita         = $('atl-nascita')?.value;
    const tipoArco        = $('atl-arco')?.value;
    const tecnicoId       = $('atl-tecnico')?.value;
    const isTecnico       = $('atl-is-tecnico')?.checked || false;
    const isAdmin         = $('atl-is-admin')?.checked || false;
    const pwd             = $('atl-pwd')?.value.trim();
    const wrap            = $('foto-atleta-wrap');
    const fotoBase64      = wrap?._pendingBase64 || existingData?.fotoBase64 || '';

    if (!nome) return showModal('Errore','Il nome è obbligatorio.',[{text:'OK',fn:()=>showAddAtleta(existingData)}]);
    if (!existingId && !pwd) return showModal('Errore','Imposta una password per l\'atleta.',[{text:'OK',fn:()=>showAddAtleta(existingData)}]);

    const data = { nome, cognome, tesseraFitarco, tesseraAltro, enteAltro, dataNascita: nascita, tipoArco, tecnicoId, isTecnico, isAdmin, fotoBase64, updatedAt: new Date().toISOString() };
    if (pwd) data.pwdHash = await hashPwd(pwd);

    if (existingId) {
        await updateDoc(doc(db, `${APP_NS}/data/asd/${S.asd.id}/atleti/${existingId}`), data);
    } else {
        data.createdAt = new Date().toISOString();
        await addDoc(atletiCol(S.asd.id), data);
    }
    await loadAtleti();
    window.setView('asdAtleti');
    showModal('✅ Salvato!', `Atleta ${nome} ${cognome} ${existingId?'aggiornato':'creato'} con successo.`,[{text:'OK'}]);
}

async function editAtleta(atletaId) {
    const atl = S.atleti.find(a => a.id === atletaId);
    if (atl) showAddAtleta(atl);
}

async function deleteAtleta(atletaId, nome) {
    showModal('🗑️ Elimina Atleta', `Vuoi eliminare <strong>${nome}</strong>? Tutti i suoi dati verranno cancellati.`, [
        { text:'Annulla', cls:'btn-ghost' },
        { text:'Elimina', cls:'btn-danger', fn: async () => {
            await deleteDoc(doc(db, `${APP_NS}/data/asd/${S.asd.id}/atleti/${atletaId}`));
            await loadAtleti();
            window.setView('asdAtleti');
        }}
    ]);
}
window.toggleAdminCheckbox = (checked) => {
    const wrap = document.getElementById('atl-admin-wrap');
    if (wrap) wrap.style.display = checked ? 'block' : 'none';
    if (!checked) {
        const adminCb = document.getElementById('atl-is-admin');
        if (adminCb) adminCb.checked = false;
    }
};

window.deleteAtleta = deleteAtleta;
window.editAtleta   = editAtleta;
window.showAddAtleta = showAddAtleta;

// ── ASD: VISUALIZZA DATI ATLETA ──────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
async function renderAsdAtletaDetail({ atletaId }) {
    const atl = S.atleti.find(a => a.id === atletaId) || {};
    setHeader(`${atl.nome||''} ${atl.cognome||''}`, 'Dettaglio atleta');

    const snap = await getDocs(query(sessioniCol(S.asd.id), where('archerId','==',atletaId)));
    const sessioni = snap.docs.map(d => _normSess({ id: d.id, ...d.data() })).sort((a,b) => (b.data||'').localeCompare(a.data||''));

    const scored = sessioni.filter(s=>!s.trainingWithoutScore&&(s.totalScore||0)>0);
    const totalScore = scored.reduce((s,x)=>s+(x.totalScore||0),0);
    const totalFrecce = sessioni.reduce((s,x)=>s+countArrowsForSession(x),0);
    const avg = scored.length > 0 ? (totalScore/scored.length).toFixed(0) : '—';
    const bestGaraPts  = sessioni.filter(s=>s.type==='Gara'&&(s.totalScore||0)>0);
    const bestAllPts   = sessioni.filter(s=>s.type==='Allenamento'&&!s.trainingWithoutScore&&(s.totalScore||0)>0);
    const recordGara   = bestGaraPts.length ? Math.max(...bestGaraPts.map(s=>s.totalScore)) : 0;
    const recordAll    = bestAllPts.length  ? Math.max(...bestAllPts.map(s=>s.totalScore))  : 0;

    // Best scores per il badge record
    const bestGara = sessioni.filter(s=>s.type==='Gara'&&(s.totalScore||0)>0);
    const bestAll  = sessioni.filter(s=>s.type==='Allenamento'&&!s.trainingWithoutScore&&(s.totalScore||0)>0);
    const maxGara  = bestGara.length ? Math.max(...bestGara.map(s=>s.totalScore||0)) : 0;
    const maxAll   = bestAll.length  ? Math.max(...bestAll.map(s=>s.totalScore||0))  : 0;

    const sessionList = sessioni.length === 0
        ? `<p style="text-align:center;color:var(--muted);padding:1.5rem">Nessuna sessione registrata.</p>`
        : sessioni.map(s => {
            const isRecord = (s.type==='Gara'&&s.totalScore===maxGara&&maxGara>0) ||
                             (s.type==='Allenamento'&&!s.trainingWithoutScore&&s.totalScore===maxAll&&maxAll>0);
            return `
            <div class="session-card" style="cursor:pointer;${isRecord?'border-color:var(--gold);':''}" onclick="window.asdDettaglioSessione('${s.id}')">
                <div style="display:flex;justify-content:space-between;align-items:flex-start">
                    <div style="flex:1">
                        <div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap">
                            <span class="badge ${s.type==='Gara'?'badge-gold':'badge-blue'}">${s.type||'Allenamento'}${s.trainingWithoutScore?' 🎓':s.quickScore?' ⚡':''}</span>
                            ${isRecord?`<span style="font-size:0.65rem;background:rgba(201,162,39,0.2);color:var(--gold);border:1px solid rgba(201,162,39,0.4);padding:1px 5px;border-radius:8px;font-weight:700">🏆 RECORD</span>`:''}
                        </div>
                        <div style="font-family:'Rajdhani',sans-serif;font-weight:700;margin-top:0.3rem">${fmtDate(s.data)}</div>
                        <div style="font-size:0.75rem;color:var(--muted)">${s.luogo||''} ${s.distanza?'· '+s.distanza:''} ${s.tipoTarga?'· '+s.tipoTarga:''}</div>
                    </div>
                    <div style="text-align:right;flex-shrink:0">
                        ${s.totalScore > 0 ? `<div style="font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:${isRecord?'var(--gold)':'var(--gold-light)'}">${s.totalScore}</div><div style="font-size:0.7rem;color:var(--muted)">${s.turn1Score?'T1:'+s.turn1Score+(s.turn2Score?' T2:'+s.turn2Score:''):''}</div>` : `<div style="color:var(--muted);font-size:0.78rem">${s.trainingWithoutScore?'Tecnico':'—'}</div>`}
                    </div>
                </div>
                ${(s.esercizConsigliati||s.esercizSvolti||s.noteCondizioniFisiche) ? `
                <div style="margin-top:0.5rem;border-top:1px solid var(--border);padding-top:0.4rem;display:flex;flex-direction:column;gap:0.2rem">
                    ${s.esercizConsigliati?`<div style="font-size:0.75rem"><strong style="color:var(--gold)">🎯 Consigliati:</strong> <span style="color:var(--muted)">${s.esercizConsigliati.substring(0,80)}${s.esercizConsigliati.length>80?'…':''}</span></div>`:''}
                    ${s.esercizSvolti?`<div style="font-size:0.75rem"><strong style="color:#5dba94">✅ Svolti:</strong> <span style="color:var(--muted)">${s.esercizSvolti.substring(0,80)}${s.esercizSvolti.length>80?'…':''}</span></div>`:''}
                    ${s.noteCondizioniFisiche?`<div style="font-size:0.75rem"><strong style="color:#5daadc">🩺 Note:</strong> <span style="color:var(--muted)">${s.noteCondizioniFisiche.substring(0,60)}${s.noteCondizioniFisiche.length>60?'…':''}</span></div>`:''}
                </div>` : ''}
            </div>`;
        }).join('');

    render(`
        <button class="btn btn-ghost btn-sm" onclick="window.setView('asdAtleti')" style="margin-bottom:1rem">← Atleti</button>

        <div style="display:flex;align-items:center;gap:0.85rem;margin-bottom:1rem">
            ${atl.fotoBase64
                ? `<img src="${atl.fotoBase64}" style="width:64px;height:64px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;flex-shrink:0">`
                : `<div class="avatar avatar-lg">${initials(atl.nome,atl.cognome)}</div>`}
            <div>
                <div style="font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700">${atl.nome} ${atl.cognome}</div>
                <div style="font-size:0.78rem;color:var(--muted)">${atl.tipoArco||''}</div>
                ${atl.tesseraFitarco ? `<div style="font-size:0.75rem;color:var(--gold)">Fitarco: ${atl.tesseraFitarco}</div>` : ''}
                ${atl.tesseraAltro ? `<div style="font-size:0.75rem;color:var(--muted)">${atl.enteAltro||'Altro'}: ${atl.tesseraAltro}</div>` : ''}
            </div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-bottom:0.75rem">
            <div class="stat-box"><div class="stat-num">${sessioni.length}</div><div class="stat-label">Sessioni</div></div>
            <div class="stat-box"><div class="stat-num">${totalFrecce}</div><div class="stat-label">Frecce</div></div>
            <div class="stat-box"><div class="stat-num">${avg}</div><div class="stat-label">Media</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1rem">
            <div class="stat-box" style="${recordGara>0?'border-color:var(--gold)':''}">
                <div class="stat-num" style="color:var(--gold-light)">${recordGara||'—'}</div>
                <div class="stat-label">🏆 Record Gara</div>
            </div>
            <div class="stat-box" style="${recordAll>0?'border-color:rgba(201,162,39,0.4)':''}">
                <div class="stat-num">${recordAll||'—'}</div>
                <div class="stat-label">🎯 Record Alln.</div>
            </div>
        </div>

        <div class="card" style="margin-bottom:1rem;background:rgba(201,162,39,0.05);border-color:var(--gold)">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div style="font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold)">🏅 Obiettivi Atleta</div>
                <button class="btn btn-gold btn-sm" onclick="window.newObiettivo('${atl.id}')">➕ Assegna</button>
            </div>
        </div>

        <div class="gold-line"></div>
        <h3 style="font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold);margin-bottom:0.75rem">📋 Sessioni Recenti</h3>
        ${sessionList}
    `);
}

async function showSessionDetail(sessionId, atletaId) {
    window.asdDettaglioSessione(sessionId);
}
window.showSessionDetail = showSessionDetail;

window.asdDettaglioSessione = async (sessionId) => {
    const snapRef = doc(db, `${APP_NS}/data/asd/${S.asd.id}/sessioni/${sessionId}`);
    const snap = await getDoc(snapRef);
    if (!snap.exists()) return;
    const s = _normSess({ id: snap.id, ...snap.data() });
    window.setView('detailedSummary', { sessione: s });
};

// ── ASD: MESSAGGI ────────────────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
async function renderAsdMessaggi() {
    await loadAtleti();
    const isMainAdmin = S.role === 'asd' || isAtletaAdmin();
    const coachAthlete = S.role === 'atleta' && S.atleta?.isTecnico;
    const isOnlyCoach = coachAthlete && !isMainAdmin;

    setHeader(isOnlyCoach ? '📨 Messaggi Coach' : '📨 Messaggi ASD', S.asd?.nome||'');

    // State per distinguere tra invio come ASD o come Tecnico (se l'utente è entrambi)
    if (isMainAdmin && coachAthlete && window._msgRole === undefined) {
        window._msgRole = 'asd';
    } else if (isOnlyCoach) {
        window._msgRole = 'coach';
    } else if (isMainAdmin && !coachAthlete) {
        window._msgRole = 'asd';
    }

    const snap = await getDocs(msgCol(S.asd.id));
    const allMsgs = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>((b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)));

    // Filtra i messaggi in base al ruolo
    let filteredMsgs = [];
    if (isMainAdmin) {
        // L'admin ASD vede tutto
        filteredMsgs = allMsgs;
    } else if (isOnlyCoach) {
        // Il tecnico vede solo:
        // 1. Messaggi inviati da lui (coachId === mio id)
        // 2. Messaggi inviati dall'ASD (mittente === 'asd') ai SUOI atleti
        // 3. Messaggi ricevuti (da implementare se serve, per ora sono solo "inviati")
        const mieiAtletiIds = S.atleti.map(a => a.id);
        filteredMsgs = allMsgs.filter(m => {
            if (m.coachId === S.atleta.id) return true;
            if (m.mittente === 'asd' && (m.destinatari === 'tutti' || mieiAtletiIds.includes(m.destinatari))) return true;
            return false;
        });
    }

    const destOptions = [
        `<option value="tutti">${isOnlyCoach ? '📢 Tutti i miei atleti' : '📢 Tutti gli atleti'}</option>`,
        ...S.atleti.map(a=>`<option value="${a.id}">${a.nome} ${a.cognome}</option>`)
    ].join('');

    const msgList = filteredMsgs.length === 0
        ? `<p style="text-align:center;color:var(--muted);padding:1.5rem 0">Nessun messaggio trovato.</p>`
        : filteredMsgs.map(m => {
            const destAtleta = S.atleti.find(a=>a.id===m.destinatari);
            const destNome = m.destinatari==='tutti' ? '📢 Tutti' : (destAtleta ? destAtleta.nome+' '+destAtleta.cognome : m.destinatari);
            const dataMsg = m.createdAt ? new Date(m.createdAt.seconds*1000).toLocaleDateString('it') : '';
            const scadenza = m.durataDays && m.createdAt ?
                new Date(m.createdAt.seconds*1000 + m.durataDays*86400000) : null;
            const scaduto = scadenza && scadenza < new Date();
            const mittLabel = m.mittente === 'asd' ? '🏛️ ASD' : '👤 Tecnico';

            return `
            <div class="msg-sent" style="margin-bottom:0.6rem;${scaduto?'opacity:0.55':''}">
                <div style="display:flex;justify-content:space-between;align-items:start">
                    <div style="font-size:0.72rem;color:var(--gold)">
                        <span style="background:rgba(201,162,39,0.2);padding:1px 4px;border-radius:4px;margin-right:4px">${mittLabel}</span>
                        → ${destNome} · ${dataMsg}
                        ${scadenza?`<span style="color:${scaduto?'var(--danger)':'#5dba94'};margin-left:4px">${scaduto?'⏰ Scaduto':'⏱️ Scade '+scadenza.toLocaleDateString('it')}</span>`:''}
                    </div>
                    <button onclick="window.eliminaMessaggioAsd('${m.id}')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:0.8rem;padding:0 0 0 8px;flex-shrink:0" title="Elimina">✕</button>
                </div>
                <div style="font-size:0.88rem;margin-top:0.2rem">${m.testo}</div>
                ${m.esercizi ? `<div style="margin-top:0.4rem;font-size:0.8rem;color:var(--gold-light)">🎯 ${m.esercizi}</div>` : ''}
                ${m.obiettivo ? `<div style="margin-top:0.3rem;font-size:0.75rem;color:#5dba94">🏅 Obiettivo: ${m.obiettivo.title||''} (${m.obiettivo.targetValue} ${m.obiettivo.type==='arrows'?'frecce':'pt'})</div>` : ''}
            </div>`;
        }).join('');

    render(`

async function sendMessaggio() {
    const dest    = $('msg-dest')?.value;
    const testo   = $('msg-testo')?.value.trim();
    const eserc   = $('msg-eserc')?.value.trim();
    const obTipo  = $('msg-ob-tipo')?.value;
    const obVal   = parseInt($('msg-ob-val')?.value)||0;
    const obTitle = $('msg-ob-title')?.value.trim();
    const obPer   = $('msg-ob-period')?.value||'monthly';
    const obStart = $('msg-ob-start-date')?.value;
    const obTurn  = $('msg-ob-filter-turn')?.value;
    const obTypeF = $('msg-ob-filter-type')?.value;
    const obQs    = $('msg-ob-filter-qs')?.checked;

    if (!testo) return showModal('Errore','Scrivi un messaggio.',[{text:'OK'}]);

    const durata = parseInt(document.getElementById('msg-durata')?.value)||0;
    const esercF = document.getElementById('msg-eserc-filter')?.value||'both';

    // Usa il ruolo selezionato nella UI per taggare il mittente
    const role = window._msgRole || 'asd';
    const msgData = {
        destinatari: dest,
        testo,
        esercizi: eserc,
        mittente: role,
        coachId: role === 'coach' ? S.atleta.id : null,
        createdAt: serverTimestamp()
    };
    if (durata > 0) msgData.esercizDurataSess = durata;
    msgData.esercizFilter = esercF;

    if (obTipo && obVal > 0) {
        msgData.obiettivo = {
            type:obTipo, targetValue:obVal, title:obTitle||`Obiettivo: ${obVal}`, period:obPer,
            startDate: obStart, filterTurn: obTurn, filterType: obTypeF, includeQuickScore: obQs
        };
    }
    await addDoc(msgCol(S.asd.id), msgData);

    // Se ci sono esercizi o obiettivo, salvali anche nell'atleta/atleti destinatari
    // S.atleti è già filtrato in loadAtleti() se l'utente è un Coach
    const destinatari = dest === 'tutti' ? S.atleti.map(a=>a.id) : [dest];
    for (const atletaId of destinatari) {
        // Salva esercizi consigliati come nota nell'atleta (campo 'esercizConsigliatiCoach')
        if (eserc) {
            const atletaRef = doc(db, `${APP_NS}/data/asd/${S.asd.id}/atleti/${atletaId}`);
            const updateObj = {
                esercizConsigliatiCoach: eserc,
                esercizAggiornatiIl: new Date().toISOString().split('T')[0],
                esercizFilter: esercF
            };
            if (durata > 0) updateObj.esercizDurataSess = durata;
            else delete updateObj.esercizDurataSess; // reset if no duration
            await updateDoc(atletaRef, updateObj).catch(()=>{});
        }
        // Crea obiettivo nel profilo atleta se specificato
        if (obTipo && obVal > 0) {
            const goalsRef = collection(db, `${APP_NS}/data/asd/${S.asd.id}/atleti/${atletaId}/goals`);
            await addDoc(goalsRef, {
                title: obTitle||`Obiettivo: ${obVal}`,
                type: obTipo, targetValue: obVal, period: obPer,
                startDate: obStart, filterTurn: obTurn, filterType: obTypeF, includeQuickScore: obQs,
                completed: false,
                fromCoach: true,
                mittente: role,
                coachId: role === 'coach' ? S.atleta.id : null,
                createdAt: new Date().toISOString()
            }).catch(()=>{});
        }
    }

    const esito = [eserc ? '✅ Esercizi consigliati salvati' : '', obTipo && obVal ? '🏅 Obiettivo aggiunto all\'atleta' : ''].filter(Boolean).join(' · ');
    showModal('✅ Inviato!', esito ? 'Messaggio inviato. ' + esito : 'Messaggio inviato con successo.', [{text:'OK', fn:()=>window.setView('asdMessaggi')}]);
}
window.sendMessaggio = sendMessaggio;

window.previewLogoFile = function(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) return showModal('Errore','File troppo grande. Max 2MB.',[{text:'OK'}]);
    const reader = new FileReader();
    reader.onload = e => {
        const b64 = e.target.result;
        const wrap = $('logo-preview-wrap');
        wrap.innerHTML = `<img id="logo-preview-img" src="${b64}" style="width:100%;height:100%;object-fit:cover">`;
        wrap._pendingBase64 = b64;
    };
    reader.readAsDataURL(file);
};

window.previewFotoAtleta = function(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) return showModal('Errore','File troppo grande. Max 2MB.',[{text:'OK'}]);
    const reader = new FileReader();
    reader.onload = e => {
        const b64 = e.target.result;
        const prev = $('foto-atleta-preview');
        if (prev) { prev.src = b64; prev.style.display = 'block'; }
        const wrap = $('foto-atleta-wrap');
        if (wrap) wrap._pendingBase64 = b64;
    };
    reader.readAsDataURL(file);
};

window.loginAtletaConPassword = async () => {
    const pwd = $('atl-login-pwd')?.value.trim();
    if (!pwd) return showModal('Errore','Inserisci la password.',[{text:'OK'}]);
    const pwdH = await hashPwd(pwd);
    const atleti = S._tempAtleti || [];

    const matches = atleti.filter(a => a.pwdHash === pwdH);
    let trovato = null;

    if (matches.length === 1) {
        trovato = matches[0];
    } else if (matches.length > 1) {
        return showModal('⚠️ Password non univoca', 'Più atleti hanno questa password. Contatta la tua ASD per impostare una password unica.', [{text:'OK'}]);
    }

    if (!trovato) return showModal('❌ Errore','Password non valida o atleta non trovato.',[{text:'OK'}]);

    S.role   = 'atleta';
    S.asd    = S._tempAsd;
    S.atleta = trovato;
    localStorage.setItem('acm_atleta_session', JSON.stringify({ asdId: S._tempAsd.id, atletaId: trovato.id }));
    buildNav();
    await loadAtletaSessioni();
    window.setView('atletaMenu');
    setTimeout(checkDraftSession, 400);
};

function isAtletaAdmin() {
    if (!S.atleta || !S.asd) return false;
    // Admin tramite flag isAdmin sul profilo atleta
    if (S.atleta.isAdmin) return true;
    // Admin tramite nome corrispondente all'adminName della ASD
    if (!S.asd.adminName) return false;
    const atlFull = `${S.atleta.nome||''} ${S.atleta.cognome||''}`.trim().toLowerCase();
    const admFull = S.asd.adminName.trim().toLowerCase();
    return atlFull === admFull;
}

function _normSess(s) {
    if (!s) return null;
    let dataStr = s.data || '';
    if (s.data && typeof s.data === 'object' && s.data.seconds) {
        dataStr = new Date(s.data.seconds * 1000).toISOString().split('T')[0];
    }
    // Normalizzazione campi note ed esercizi per garantire compatibilità tra versioni e varianti nomi campo
    const ec = (s.esercizConsigliati || s.eserciziConsigliati || s.exercises || s.notes || s.esercizi_consigliati || s.note_consigliate || '').toString().trim();
    const es = (s.esercizSvolti || s.eserciziSvolti || s.exercisesDone || s.trainingContent || s.esercizi_svolti || s.trainingNotes || '').toString().trim();
    const nf = (s.noteCondizioniFisiche || s.noteFisiche || s.physicalNotes || s.note_fisiche || s.physical_notes || '').toString().trim();

    return {
        ...s,
        data: dataStr,
        totalScore: parseInt(s.totalScore) || 0,
        turn1Score: parseInt(s.turn1Score) || 0,
        turn2Score: parseInt(s.turn2Score) || 0,
        totalX: parseInt(s.totalX || s.xCount || 0) || 0,
        totalTen: parseInt(s.totalTen || s.tenCount || 0) || 0,
        totalNine: parseInt(s.totalNine || s.nineCount || 0) || 0,
        frecceAggiuntive: parseInt(s.frecceAggiuntive || s.frecce_aggiuntive || s.arrows || 0) || 0,
        esercizConsigliati: ec,
        esercizSvolti:      es,
        noteCondizioniFisiche: nf
    };
}

async function loadAtletaSessioni() {
    if (!S.asd || !S.atleta) return;
    try {
        const snap = await getDocs(query(sessioniCol(S.asd.id), where('archerId','==',S.atleta.id)));
        S.sessioni = snap.docs.map(d => ({ id: d.id, ..._normSess(d.data()) }))
            .filter(s => s !== null)
            .sort((a,b) => (b.data||'').localeCompare(a.data||''));
    } catch(e) {
        console.error("Error loading athlete sessions:", e);
    }
}

function tkScore(x,y,cfg){
    if(cfg==='tripla'){
        let bd=Infinity,bcy=TK_TR_CY[0];
        TK_TR_CY.forEach(cy=>{const d=Math.hypot(x-TK_TR_CX,y-cy);if(d<bd){bd=d;bcy=cy;}});
        for(const r of TK_RINGS_T) if(bd<=r.r+0.5) return r.s; return 'M';
    }
    const d=Math.hypot(x-170,y-170);
    for(const r of TK_RINGS_S) if(d<=r.r+0.5) return r.s; return 'M';
}
function tkSort(arr){
    const o={'X':0,'10':1,'9':2,'8':3,'7':4,'6':5,'5':6,'4':7,'3':8,'2':9,'1':10,'M':11,'m':11,'':12};
    return arr.sort((a,b)=>(o[a]??12)-(o[b]??12));
}
function tkCalc(grid){
    if(!grid||!grid.length) return{score:0,X:0,Ten:0,Nine:0,fired:0,avg:0,max:0,volleys:[]};
    let tot=0,X=0,Ten=0,Nine=0,fired=0; const volleys=[];
    grid.forEach((row,i)=>{
        const v=row.filter(s=>s!==''&&s!==undefined);
        if(!v.length) return;
        let p=0,vx=0,vt=0,vn=0;
        v.forEach(s=>{const n=s==='X'?10:s==='M'?0:parseInt(s)||0;p+=n;if(s==='X')vx++;else if(s==='10')vt++;else if(n===9)vn++;});
        tot+=p;X+=vx;Ten+=vt;Nine+=vn;fired+=v.length;
        volleys.push({i,v,parz:p,tot,x10:`${vx}-${vt}`,nine:vn});
    });
    return{score:tot,X,Ten,Nine,fired,avg:fired>0?tot/fired:0,max:TK.rows*TK.cols*10,volleys};
}

function tkCalc3D(grid, d3){
    // Calcola punteggio 3D da grid: ogni riga = piazzola, ogni cella = valore testuale
    // es. '20','18','14','M','—' per FIARC; '11','10','8','5','M','—' per FITARCO
    // '—' = non tirata (piazzola chiusa prima)
    let tot=0, fired=0, piazzoleComplete=0;
    const rows=[];
    (grid||[]).forEach((row,pi)=>{
        const vals=row.filter(v=>v!==''&&v!==undefined&&v!=='—');
        if(!vals.length) return;
        let p=0;
        vals.forEach(v=>{ p+=parseInt(v)||0; });
        tot+=p; fired+=vals.length; piazzoleComplete++;
        rows.push({pi,vals,parz:p,tot});
    });
    const maxPerPiazzola=d3.ente==='FITARCO'?11:20;
    const maxScore=(d3.piazzole||0)*maxPerPiazzola;
    return{score:tot,fired,piazzoleComplete,avg:piazzoleComplete>0?tot/piazzoleComplete:0,max:maxScore,rows};
}

window.tkKey=(val)=>{
    const {row,col}=TK.activeCell,ri=row-1,ci=col-1;
    if(ri<0||ri>=TK.rows||ci<0||ci>=TK.cols) return;
    if(val==='CANC'){
        if(TK.grid[ri][ci]!=='') TK.grid[ri][ci]='';
        else{let nc=ci-1,nr=ri;if(nc<0){nr=ri-1;nc=TK.cols-1;}if(nr>=0)TK.activeCell={row:nr+1,col:nc+1};}
    } else {
        // BUG FIX: blocca l'inserimento se la cella è oltre l'ultima riga disponibile
        // Cioè: se siamo all'ultima riga e l'ultima colonna è già piena → non sovrascrivere
        const rowFull = TK.grid[ri].every(s=>s!==''&&s!==undefined);
        if(rowFull && ri===TK.rows-1) return; // ultima riga completa → ignora
        if(rowFull) return; // riga corrente completa (non ancora avanzata) → ignora

        TK.grid[ri][ci]=val.toUpperCase();
        let nc=ci+1,nr=ri;
        if(nc>=TK.cols){
            // Riga completata: ordina e avanza alla riga successiva
            TK.grid[ri]=tkSort([...TK.grid[ri]]);
            nc=0;nr=ri+1;
        }
        if(nr<TK.rows)TK.activeCell={row:nr+1,col:nc+1};
        else TK.activeCell={row:TK.rows,col:TK.cols}; // rimani sull'ultima cella
    }
    tkSave();
    if(!TK_OV.active)tkRenderScoring();
};

        ${Array(freq).fill(0).map((_,i)=>`<th style="width:44px">${i+1}ª</th>`).join('')}
        <th>Tot</th><th>Cum.</th>
    </tr></thead><tbody>`;
    let cum=0;
    for(let pi=0;pi<nPiaz;pi++){
        const row=TK.grid[pi]||[];
        const vals=row.filter(v=>v!==''&&v!==undefined&&v!=='—');
        const rowP=vals.reduce((s,v)=>s+(parseInt(v)||0),0);
        if(vals.length) cum+=rowP;
        const isActive=pi===piazzolaCorrente&&!finito;
        tbl+=`<tr style="background:${isActive?'rgba(201,162,39,0.1)':pi%2===0?'var(--dark3)':'var(--dark2)'};${isActive?'border:1.5px solid var(--gold);':''}">
            <td style="font-weight:700;${isActive?'color:var(--gold)':'color:var(--muted)'}">P${pi+1}</td>
            ${Array(freq).fill(0).map((_,ci)=>{
                const v=TK.grid[pi]?.[ci]||'';
                const isSkip=v==='—';
                const isAct=isActive&&ci===frecciaCorrente-1;
                return `<td style="${isAct?'background:var(--gold);color:#000;font-weight:900;':''}${!isAct&&v?scoreColor(v):''};${isSkip?'color:var(--muted)':''}">${v==='0'?'M':v||''}</td>`;
            }).join('')}
            <td style="font-weight:700">${vals.length?rowP:''}</td>
            <td style="font-weight:700">${vals.length?cum:''}</td>
        </tr>`;
    }
    tbl+=`<tr style="background:var(--gold);color:#000;font-weight:900">
        <td colspan="${1+freq+1}" style="text-align:right;padding-right:0.4rem">Totale</td>

    tbl+=`</tbody></table></div>`;

    // Live stats
    const live=!finito&&piazzolaCorrente>0?`<div style="background:linear-gradient(135deg,var(--dark3),var(--dark2));border:2px solid var(--gold);border-radius:12px;padding:0.65rem;margin-bottom:0.75rem">

            <div class="stat-box"><div class="stat-num">${piazzolaCorrente}</div><div class="stat-label">Piazzole</div></div>
            <div class="stat-box"><div class="stat-num">${nPiaz-piazzolaCorrente}</div><div class="stat-label">Rimaste</div></div>
            <div class="stat-box"><div class="stat-num">${st.avg.toFixed(1)}</div><div class="stat-label">Media</div></div>
        </div>
    </div>`:'';

    // Keypad 3D
    const kp=!finito?`<div style="margin-bottom:0.75rem">

        </div>

    </div>`:
    `<div class="card card-gold" style="text-align:center;margin-bottom:0.75rem">
        <div style="font-size:1.5rem;margin-bottom:0.3rem">✅</div>

    `);
}

window.tk3dKey = (val) => {
    const d3=TK.session?.d3;
    if(!d3) return;
    const pi=d3.piazzola, fi=d3.frecciaCorrente-1; // 0-based
    if(pi>=d3.piazzole) return;

    const punti=parseInt(val)||0;
    TK.grid[pi][fi]=punti===0?'0':val;

    const rule = TK_3D_RULES[d3.ente];
    const isFirstHitOnly = rule ? rule.firstHitOnly : (d3.ente === 'FITARCO');

    if (punti > 0 && isFirstHitOnly) {
        // Colpito: piazzola chiusa (BATTUTA, PERCORSO, TRACCIATO, FITARCO)
        for(let c=fi+1;c<d3.frecce;c++) TK.grid[pi][c]='—';
        d3.piazzola++; d3.frecciaCorrente=1;
    } else {
        // Mancato o modalità a frecce multiple (ROUND 3D)
        if(fi+1 < d3.frecce) {
            d3.frecciaCorrente++;
        } else {
            d3.piazzola++; d3.frecciaCorrente=1;
        }
    }
    tkSave();
    tkRenderScoring3D();
};

window.tk3dUndo = () => {
    const d3=TK.session?.d3;
    if(!d3) return;
    // Torna indietro di un passo
    let pi=d3.piazzola, fi=d3.frecciaCorrente-1;
    // Trova l'ultima cella compilata
    if(fi<=0 && pi>0) { pi--; fi=d3.frecce-1; }
    else if(fi>0) { fi--; }
    // Cancella '—' trailing e la cella
    for(let c=TK.grid[pi].length-1;c>=fi;c--) TK.grid[pi][c]='';
    d3.piazzola=pi; d3.frecciaCorrente=fi+1;
    tkSave();
    tkRenderScoring3D();
};

function tkOvDrawTarget(canvas,cfg){
    const isTr=cfg==='tripla';
    canvas.querySelectorAll('.tk-r,.tk-d,.tk-bg').forEach(d=>d.remove());
    if(isTr){
        const bg=document.createElement('div');bg.className='tk-bg';bg.style.cssText='position:absolute;inset:0;background:#1e293b;border-radius:10px';canvas.appendChild(bg);
        TK_TR_CY.forEach(cy=>{
            // Sfondo bianco per ogni cerchio della tripla
            const bgr=document.createElement('div');bgr.className='tk-r';bgr.style.cssText=`position:absolute;border-radius:50%;width:${TK_RINGS_T[TK_RINGS_T.length-1].r*2+4}px;height:${TK_RINGS_T[TK_RINGS_T.length-1].r*2+4}px;background:#e2e8f0;left:${TK_TR_CX-TK_RINGS_T[TK_RINGS_T.length-1].r-2}px;top:${cy-TK_RINGS_T[TK_RINGS_T.length-1].r-2}px`;canvas.appendChild(bgr);
            [...TK_RINGS_T].reverse().forEach(r=>{const el=document.createElement('div');el.className='tk-r';el.style.cssText=`position:absolute;border-radius:50%;width:${r.r*2}px;height:${r.r*2}px;background:${r.c};border:${r.border||'1px solid rgba(0,0,0,0.3)'};left:${TK_TR_CX-r.r}px;top:${cy-r.r}px`;canvas.appendChild(el);});
        });
    } else {
        // Sfondo bianco per l'intera targa
        const bg=document.createElement('div');bg.className='tk-r';bg.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;width:340px;height:340px;background:#e2e8f0';canvas.appendChild(bg);
        [...TK_RINGS_S].reverse().forEach(r=>{const el=document.createElement('div');el.className='tk-r';el.style.cssText=`position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;width:${r.r*2}px;height:${r.r*2}px;background:${r.c};border:${r.border||'1px solid rgba(0,0,0,0.2)'}`;canvas.appendChild(el);});
    }
    const ri=TK.activeCell.row-1;
    TK.grid.forEach((row,r)=>row.forEach((sc,c)=>{
        if(!sc)return;
        const pos=window._tkPos[`${r}_${c}`];
        if(pos&&(pos.x||pos.y)){const d=document.createElement('div');d.className='tk-d';d.style.cssText=`position:absolute;width:7px;height:7px;background:${r<ri?'#94a3b8':'#ff4500'};border:1.5px solid rgba(255,255,255,0.9);border-radius:50%;transform:translate(-50%,-50%);left:${pos.x}px;top:${pos.y}px;pointer-events:none`;canvas.appendChild(d);}
    }));
}
function tkOvBuildMag(cfg){
    const isTr=cfg==='tripla',W=isTr?TK_TR_W:340,H=isTr?TK_TR_H:340;
    const off=document.createElement('canvas');off.width=W;off.height=H;
    const ctx=off.getContext('2d');
    const rings=isTr?TK_RINGS_T:TK_RINGS_S;
    const dT=(cx,cy)=>{
        // Sfondo bianco
        ctx.beginPath();ctx.arc(cx,cy,rings[rings.length-1].r+2,0,Math.PI*2);ctx.fillStyle='#e2e8f0';ctx.fill();
        [...rings].reverse().forEach(r=>{
            ctx.beginPath();ctx.arc(cx,cy,r.r,0,Math.PI*2);
            ctx.fillStyle=r.c;ctx.fill();
            // Linea di demarcazione
            ctx.beginPath();ctx.arc(cx,cy,r.r,0,Math.PI*2);
            const bc=r.border?r.border.split(' ').pop():'rgba(0,0,0,0.25)';
            ctx.strokeStyle=bc;ctx.lineWidth=r.border&&r.border.includes('2px')?1.5:0.8;ctx.stroke();
        });
    };
    if(isTr){ctx.fillStyle='#1e293b';ctx.fillRect(0,0,W,H);TK_TR_CY.forEach(cy=>dT(TK_TR_CX,cy));}
    else{ctx.fillStyle='#e2e8f0';ctx.beginPath();ctx.arc(170,170,170,0,Math.PI*2);ctx.fill();dT(170,170);}
    const mag=document.getElementById('test-magnifier');
    if(mag)mag.style.backgroundImage=`url('${off.toDataURL()}')`;
}
let _tkPt=false,_tkSc=null,_tkX=0,_tkY=0;
function tkOvSetupPtr(canvas){
    if(canvas._tkA)return;canvas._tkA=true;
    canvas.addEventListener('pointerdown',e=>{if(!TK_OV.active)return;e.preventDefault();_tkPt=true;_tkSc=null;tkOvMove(e,canvas);},{passive:false});
}
if(!window._tkPL){
    window._tkPL=true;
    window.addEventListener('pointermove',e=>{if(!_tkPt||!TK_OV.active)return;const cv=document.getElementById('tk-ov-canvas');if(cv)tkOvMove(e,cv);});
    window.addEventListener('pointerup',e=>{
        if(!_tkPt||!TK_OV.active)return;_tkPt=false;
        const m=document.getElementById('test-magnifier');if(m)m.style.display='none';
        if(!_tkSc)return;
        const ri=TK.activeCell.row-1,ci=TK.activeCell.col-1;
        window._tkPos[`${ri}_${ci}`]={x:_tkX,y:_tkY};
        window.tkKey(_tkSc);tkOvRender();
    });
}
function tkOvMove(e,canvas){
    const rect=canvas.getBoundingClientRect();
    const cx=e.clientX,cy=e.clientY;
    const cfg=TK_OV.cfg,isTr=cfg==='tripla';
    const cW=isTr?TK_TR_W:340,cH=isTr?TK_TR_H:340;
    const x=Math.max(0,Math.min(cW,cx-rect.left-2)),y=Math.max(0,Math.min(cH,cy-rect.top-2));
    _tkX=x;_tkY=y;_tkSc=tkScore(x,y,cfg);
    const Z=4,MR=110,LF=270;
    const mag=document.getElementById('test-magnifier');
    if(mag){mag.style.display='block';mag.style.left=(cx-MR)+'px';mag.style.top=(cy-LF)+'px';mag.style.backgroundSize=`${cW*Z}px ${cH*Z}px`;mag.style.backgroundPosition=`${MR-x*Z}px ${MR-y*Z}px`;}
    const lv=document.getElementById('tk-ov-live');
    if(lv){lv.textContent=_tkSc;lv.style.color=_tkSc==='X'||_tkSc==='10'?'#fbbf24':_tkSc==='M'?'#ef4444':'#ffffff';}
}
window.tkOvMiss=()=>{const ri=TK.activeCell.row-1,ci=TK.activeCell.col-1;window._tkPos[`${ri}_${ci}`]={x:0,y:0};window.tkKey('M');tkOvRender();};

async function tkDecrementEsercCoach() {

    const nuovo = Math.max(0, S.atleta.esercizDurataSess - 1);
    const atletaRef = doc(db, `${APP_NS}/data/asd/${S.asd.id}/atleti/${S.atleta.id}`);
    await updateDoc(atletaRef, { esercizDurataSess: nuovo }).catch(()=>{});
    S.atleta.esercizDurataSess = nuovo;
}

async function renderAtletaDati() {
    setHeader('📊 I Miei Dati', S.atleta ? `${S.atleta.nome} ${S.atleta.cognome}` : '');
    await loadAtletaSessioniCached();

    // ── Stats globali (sempre su tutte le sessioni) ──

    const allList  = S.sessioni.filter(s=>!s.trainingWithoutScore&&(s.totalScore||0)>0);
    const bestScore = allList.length > 0 ? Math.max(...allList.map(s=>s.totalScore||0)) : 0;
    const sessCount = S.sessioni.length;
    const garaCount = S.sessioni.filter(s=>s.type==='Gara').length;
    const allCount  = S.sessioni.filter(s=>s.type==='Allenamento').length;
    const totalFrecce = S.sessioni.reduce((sum,s)=>sum+countArrowsForSession(s),0);

    // ── Filtri ──
    const filtroTipo    = window._filtroTipo    || '';
    const filtroPeriodo = window._filtroPeriodo || '';
    const anni = [...new Set(S.sessioni.map(s=>s.data?.substring(0,4)).filter(Boolean))].sort().reverse();

    // Applica filtro tipo
    let sess = [...S.sessioni];
    if (filtroTipo === 'Gara')       sess = sess.filter(s=>s.type==='Gara'&&!s.trainingWithoutScore);
    else if (filtroTipo==='Allenamento') sess = sess.filter(s=>s.type==='Allenamento'&&!s.trainingWithoutScore);
    else if (filtroTipo==='tecnico')  sess = sess.filter(s=>s.trainingWithoutScore===true);

    // Applica filtro periodo
    const oggi = new Date(); const todayStr = oggi.toISOString().split('T')[0];
    if (filtroPeriodo === 'settimana') {
        const dow = oggi.getDay(), diff = dow===0?-6:1-dow;
        const lun = new Date(oggi); lun.setDate(oggi.getDate()+diff);
        const lunStr = lun.toISOString().split('T')[0];
        sess = sess.filter(s=>s.data>=lunStr&&s.data<=todayStr);
    } else if (filtroPeriodo === 'mese') {
        const ms = `${oggi.getFullYear()}-${String(oggi.getMonth()+1).padStart(2,'0')}-01`;
        sess = sess.filter(s=>s.data>=ms&&s.data<=todayStr);
    } else if (filtroPeriodo && filtroPeriodo.length===4) {
        // anno specifico
        sess = sess.filter(s=>s.data&&s.data.startsWith(filtroPeriodo));
    }

    // ── Ordine cronologico decrescente (più recenti in alto), poi per orario ──
    sess.sort((a,b)=>{
        const da=`${a.data||'0000-00-00'}T${a.ora||'00:00'}`;
        const db=`${b.data||'0000-00-00'}T${b.ora||'00:00'}`;
        return db.localeCompare(da);
    });

    const sessList = sess.length === 0
        ? `<p style="text-align:center;color:var(--muted);padding:2rem">${filtroTipo||filtroPeriodo?'Nessuna sessione per i filtri selezionati.':`Nessuna sessione registrata.`}</p>`
        : sess.map(s=>`
            <div class="session-card" onclick="window.apriDettaglio('${s.id||s.docId||''}')" style="cursor:pointer">
                <div style="display:flex;justify-content:space-between;align-items:flex-start">
                    <div style="flex:1;min-width:0">
                        <div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap">
                            <span class="badge ${s.type==='Gara'?'badge-gold':'badge-blue'}">${s.type||'Allenamento'}${s.trainingWithoutScore?' 🎓':s.quickScore?' ⚡':''}</span>
                        </div>
                        <div style="font-family:'Rajdhani',sans-serif;font-weight:700;margin-top:0.25rem">${fmtDate(s.data)}${s.ora?` <span style="font-size:0.72rem;color:var(--muted)">ore ${s.ora}</span>`:''}</div>
                        <div style="font-size:0.75rem;color:var(--muted)">${s.luogo||''} ${s.distanza?'· '+s.distanza:''} ${s.tipoTarga?'· '+s.tipoTarga:''}</div>
                    </div>
                    ${s.totalScore>0?`<div style="text-align:right;flex-shrink:0"><div style="font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--gold-light)">${s.totalScore}</div><div style="font-size:0.7rem;color:var(--muted)">${s.turn1Score?'T1:'+s.turn1Score+(s.turn2Score?' T2:'+s.turn2Score:''):''}</div></div>`:`<div style="font-size:0.75rem;color:var(--muted);flex-shrink:0">${s.trainingWithoutScore?'Tecnico':'—'}</div>`}
                </div>
            </div>
        `).join('');

    const hasFiltri = filtroTipo || filtroPeriodo;
    render(`
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.45rem;margin-bottom:0.75rem">
            <div class="stat-box"><div class="stat-num">${sessCount}</div><div class="stat-label">Sessioni</div></div>
            <div class="stat-box"><div class="stat-num">${allCount}</div><div class="stat-label">Allenamenti</div></div>
            <div class="stat-box"><div class="stat-num">${garaCount}</div><div class="stat-label">Gare</div></div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:0.45rem;margin-bottom:1rem">
            <div class="stat-box"><div class="stat-num">${bestScore||'—'}</div><div class="stat-label">Best Score</div></div>
            <div class="stat-box"><div class="stat-num">${totalFrecce}</div><div class="stat-label">Frecce Tot.</div></div>
        </div>

        <div class="gold-line"></div>
        <div style="font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold);margin-bottom:0.5rem">🔍 Filtra Sessioni</div>

        <!-- Riga 1: tipo -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.3rem;margin-bottom:0.4rem">
            ${[['','Tutti'],['Allenamento','Allenamento'],['Gara','Gara'],['tecnico','Tecnico 🎓']].map(([v,l])=>`
                <button onclick="window._filtroTipo='${v}';renderAtletaDati()" style="padding:0.3rem 0;font-size:0.73rem;font-weight:700;border-radius:8px;border:1.5px solid ${filtroTipo===v?'var(--gold)':'var(--border)'};background:${filtroTipo===v?'rgba(201,162,39,0.15)':'var(--dark3)'};color:${filtroTipo===v?'var(--gold)':'var(--muted)'};cursor:pointer">${l}</button>
            `).join('')}
        </div>
        <!-- Riga 2: periodo -->
        <div style="display:flex;gap:0.3rem;margin-bottom:0.75rem">
            ${[['','Tutto'],['settimana','Sett.'],['mese','Mese']].map(([v,l])=>`
                <button onclick="window._filtroPeriodo='${v}';renderAtletaDati()" style="flex:1;padding:0.35rem 0;font-size:0.73rem;font-weight:700;border-radius:8px;border:1.5px solid ${filtroPeriodo===v?'var(--gold)':'var(--border)'};background:${filtroPeriodo===v?'rgba(201,162,39,0.15)':'var(--dark3)'};color:${filtroPeriodo===v?'var(--gold)':'var(--muted)'};cursor:pointer">${l}</button>
            `).join('')}
            <select class="inp" style="flex:1.2;padding:0.25rem 0.5rem;font-size:0.73rem;height:auto;border-color:${anni.includes(filtroPeriodo)?'var(--gold)':'var(--border)'};background:${anni.includes(filtroPeriodo)?'rgba(201,162,39,0.15)':'var(--dark3)'};color:${anni.includes(filtroPeriodo)?'var(--gold)':'var(--muted)'}" onchange="window._filtroPeriodo=this.value;renderAtletaDati()">
                <option value="" ${!anni.includes(filtroPeriodo)?'selected':''}>Anno...</option>
                ${anni.map(a=>`<option value="${a}" ${filtroPeriodo===a?'selected':''}>${a}</option>`).join('')}
            </select>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
            <div style="font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold)">📋 Sessioni${hasFiltri?` (${sess.length})`:' ('+sess.length+')'}</div>
            ${hasFiltri?`<button onclick="window._filtroTipo='';window._filtroPeriodo='';renderAtletaDati()" class="btn btn-ghost btn-sm">✕ Reset</button>`:''}
        </div>
        ${sessList}
    `);
}
