<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archery Club Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gold: #c9a227;
            --gold-light: #f0c040;
            --dark: #0f0f0f;
            --dark2: #1a1a1a;
            --dark3: #242424;
            --dark4: #2e2e2e;
            --border: #3a3a3a;
            --text: #e8e0d0;
            --muted: #888;
            --success: #3d9970;
            --danger: #c0392b;
            --info: #2980b9;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
        }
        h1, h2, h3, .display { font-family: 'Rajdhani', sans-serif; }

        /* ── BACKGROUND TEXTURE ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,162,39,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(201,162,39,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── INPUTS ── */
        .inp {
            background: var(--dark3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.65rem 0.9rem;
            border-radius: 8px;
            width: 100%;
            font-family: 'Exo 2', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .inp:focus { outline: none; border-color: var(--gold); }
        .inp::placeholder { color: #555; }
        select.inp { cursor: pointer; }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
            padding: 0.65rem 1.2rem; border-radius: 8px;
            font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700;
            cursor: pointer; border: none; transition: all 0.15s;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
            letter-spacing: 0.02em;
        }
        .btn-gold { background: var(--gold); color: #0f0f0f; }
        .btn-gold:hover { background: var(--gold-light); transform: scale(1.02); }
        .btn-gold:active { transform: scale(0.98); }
        .btn-outline { background: transparent; color: var(--gold); border: 1.5px solid var(--gold); }
        .btn-outline:hover { background: rgba(201,162,39,0.08); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #e74c3c; }
        .btn-ghost { background: var(--dark3); color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
        .btn-success { background: var(--success); color: white; }
        .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.85rem; }
        .btn-lg { padding: 0.85rem 1.6rem; font-size: 1.1rem; min-height: 52px; }
        .btn-full { width: 100%; }

        /* ── CARDS ── */
        .card {
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.2rem;
        }
        .card-gold { border-color: var(--gold); }
        .card-hover { cursor: pointer; transition: all 0.2s; }
        .card-hover:hover { border-color: var(--gold); background: var(--dark3); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,162,39,0.1); }

        /* ── GOLD DIVIDER ── */
        .gold-line { height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 1.2rem 0; }

        /* ── BADGE ── */
        .badge { display: inline-block; padding: 0.2rem 0.7rem; border-radius: 99px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
        .badge-gold { background: rgba(201,162,39,0.15); color: var(--gold-light); border: 1px solid rgba(201,162,39,0.3); }
        .badge-green { background: rgba(61,153,112,0.15); color: #5dba94; border: 1px solid rgba(61,153,112,0.3); }
        .badge-blue { background: rgba(41,128,185,0.15); color: #5daadc; border: 1px solid rgba(41,128,185,0.3); }
        .badge-red { background: rgba(192,57,43,0.15); color: #e07060; border: 1px solid rgba(192,57,43,0.3); }

        /* ── TABS ── */
        .tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        .tab { flex: 1; padding: 0.6rem 0.5rem; text-align: center; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.9rem; transition: all 0.15s; color: var(--muted); background: var(--dark2); border: none; letter-spacing: 0.02em; }
        .tab.active { background: var(--gold); color: #0f0f0f; }
        .tab:not(.active):hover { background: var(--dark3); color: var(--text); }

        /* ── MODAL ── */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
        #modal-overlay.show { display: flex; }
        .modal-box { background: var(--dark2); border: 1.5px solid var(--gold); border-radius: 16px; padding: 1.5rem; max-width: 440px; width: 100%; max-height: 90vh; overflow-y: auto; }

        /* ── STAT BOX ── */
        .stat-box { background: var(--dark3); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem 1rem; text-align: center; }
        .stat-num { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--gold-light); line-height: 1; }
        .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }

        /* ── HEADER ── */
        .app-header { background: var(--dark2); border-bottom: 1px solid var(--border); padding: 0.75rem 1rem; display: flex; align-items: center; gap: 0.75rem; position: sticky; top: 0; z-index: 100; }
        .app-header .logo-text { font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--gold); letter-spacing: 0.04em; line-height: 1; }
        .app-header .sub-text { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }

        /* ── ARCHER AVATAR ── */
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--dark3); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); flex-shrink: 0; }
        .avatar-lg { width: 64px; height: 64px; font-size: 1.5rem; }
        .avatar-xl { width: 80px; height: 80px; font-size: 2rem; }

        /* ── ASD CARD (login screen) ── */
        .asd-tile { background: var(--dark2); border: 1.5px solid var(--border); border-radius: 16px; padding: 1.4rem 1rem; cursor: pointer; transition: all 0.2s; text-align: center; }
        .asd-tile:hover { border-color: var(--gold); background: var(--dark3); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(201,162,39,0.12); }
        .asd-logo-wrap { width: 72px; height: 72px; border-radius: 50%; background: var(--dark3); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; margin: 0 auto 0.75rem; overflow: hidden; }
        .asd-logo-wrap img { width: 100%; height: 100%; object-fit: cover; }

        /* ── MESSAGE BUBBLES ── */
        .msg-sent { background: rgba(201,162,39,0.12); border: 1px solid rgba(201,162,39,0.25); border-radius: 12px 12px 4px 12px; padding: 0.6rem 0.9rem; margin-left: auto; max-width: 85%; }
        .msg-recv { background: var(--dark3); border: 1px solid var(--border); border-radius: 12px 12px 12px 4px; padding: 0.6rem 0.9rem; max-width: 85%; }

        /* ── SCORE GRID ── */
        .score-tbl th, .score-tbl td { border: 1px solid var(--border); padding: 0.35rem 0.4rem; text-align: center; font-size: 0.82rem; }
        .score-tbl th { background: var(--dark3); color: var(--gold); font-family: 'Rajdhani', sans-serif; }

        /* ── ANIMATIONS ── */
        @keyframes fadeSlide { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
        .anim { animation: fadeSlide 0.28s ease both; }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            .stat-num { font-size: 1.4rem; }
            input, select, textarea { font-size: 16px !important; }
        }

        /* ── NAV DRAWER ── */
        #nav-drawer { position: fixed; top: 0; left: 0; height: 100%; width: 280px; background: var(--dark2); border-right: 1px solid var(--border); z-index: 150; transform: translateX(-100%); transition: transform 0.3s ease; overflow-y: auto; }
        #nav-drawer.open { transform: translateX(0); }
        #nav-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 149; }
        #nav-overlay.show { display: block; }
        .nav-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.75rem 1rem; border-radius: 8px; cursor: pointer; transition: all 0.15s; font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.95rem; color: var(--muted); letter-spacing: 0.02em; }
        .nav-item:hover { background: var(--dark3); color: var(--text); }
        .nav-item.active { background: rgba(201,162,39,0.12); color: var(--gold); }

        /* ── LOADING ── */
        .spinner { width: 40px; height: 40px; border: 3px solid var(--dark3); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── FORM SECTION ── */
        .form-section { background: var(--dark3); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.78rem; color: var(--gold); font-weight: 600; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.04em; }

        /* ── SESSION CARD ── */
        .session-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; transition: border-color 0.2s; }
        .session-card:hover { border-color: rgba(201,162,39,0.4); }
    </style>
</head>
<body>

<!-- NAV OVERLAY -->
<div id="nav-overlay" onclick="closeNav()"></div>

<!-- NAV DRAWER -->
<div id="nav-drawer">
    <div style="padding:1rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border)">
            <div>
                <div style="font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:var(--gold)">🏹 Archery Club</div>
                <div id="nav-user-name" style="font-size:0.72rem;color:var(--muted)"></div>
            </div>
            <button onclick="closeNav()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem">✕</button>
        </div>
        <div id="nav-items"></div>
    </div>
</div>

<!-- APP HEADER -->
<div class="app-header" id="app-header" style="display:none">
    <button onclick="toggleNav()" style="background:none;border:none;color:var(--gold);cursor:pointer;padding:2px;font-size:1.4rem">☰</button>
    <div style="flex:1">
        <div class="logo-text" id="header-title">Archery Club Manager</div>
        <div class="sub-text" id="header-sub"></div>
    </div>
    <div id="header-right"></div>
</div>

<!-- MAIN CONTENT -->
<div id="main-view" style="max-width:600px;margin:0 auto;padding:1rem 1rem 5rem">
    <div style="display:flex;justify-content:center;align-items:center;min-height:60vh">
        <div class="spinner"></div>
    </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
    <div class="modal-box">
        <h3 id="modal-title" style="font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--gold);margin-bottom:0.75rem"></h3>
        <div id="modal-body" style="margin-bottom:1rem;font-size:0.9rem"></div>
        <div id="modal-actions" style="display:flex;gap:0.5rem;justify-content:flex-end;flex-wrap:wrap"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
import { getFirestore, doc, addDoc, deleteDoc, getDoc, setDoc, onSnapshot, collection, query, where, getDocs, serverTimestamp, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

// ── FIREBASE CONFIG (test project) ─────────────────────────────────────────
const firebaseConfig = {
    apiKey: "AIzaSyApNQmWNdkuDFYsM_wTFZ9TNBfe_FgUo_c",
    authDomain: "webappasd-47443.firebaseapp.com",
    projectId: "webappasd-47443",
    storageBucket: "webappasd-47443.firebasestorage.app",
    messagingSenderId: "959832767060",
    appId: "1:959832767060:web:1c356fe08f6b7402a2cbc1"
};
const APP_NS = 'club_manager_v1'; // namespace separato dalla webapp originale

// ── STATE ───────────────────────────────────────────────────────────────────
let db, auth;
const S = {
    view: 'loading',
    role: null,          // 'asd' | 'atleta' | null
    asd: null,           // { id, nome, email, ... }
    atleta: null,        // { id, nome, cognome, ... }
    allAsd: [],
    atleti: [],          // atleti della ASD corrente
    sessioni: [],        // sessioni atleta
    messaggi: [],
};

// ── HELPERS ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const render = html => { $('main-view').innerHTML = `<div class="anim">${html}</div>`; };
function showModal(title, bodyHtml, actions=[]) {
    $('modal-title').textContent = title;
    $('modal-body').innerHTML = bodyHtml;
    $('modal-actions').innerHTML = '';
    actions.forEach(a => {
        const b = document.createElement('button');
        b.className = 'btn ' + (a.cls || 'btn-ghost');
        b.textContent = a.text;
        b.onclick = () => { closeModal(); a.fn?.(); };
        $('modal-actions').appendChild(b);
    });
    $('modal-overlay').classList.add('show');
}
function closeModal() { $('modal-overlay').classList.remove('show'); }
function hashPwd(s) {
    // Simple deterministic hash (for demo — in production use bcrypt server-side)
    let h = 0;
    for (let i = 0; i < s.length; i++) { h = (Math.imul(31, h) + s.charCodeAt(i)) | 0; }
    return 'h_' + Math.abs(h).toString(36);
}
function fmtDate(d) {
    if (!d) return 'N/D';
    const p = d.split('-');
    return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : d;
}
function initials(nome, cognome) {
    return ((nome||'?')[0] + (cognome||'?')[0]).toUpperCase();
}
function logoOrInitials(asd, size='asd-logo-wrap') {
    if (asd.logoUrl) return `<img src="${asd.logoUrl}" alt="logo" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    return `<span style="font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--gold)">${(asd.nome||'?').substring(0,2).toUpperCase()}</span>`;
}

// ── FIRESTORE REFS ──────────────────────────────────────────────────────────
const asdCol    = ()  => collection(db, `${APP_NS}/data/asd`);
const atletiCol = (asdId) => collection(db, `${APP_NS}/data/asd/${asdId}/atleti`);
const sessioniCol = (asdId, atletaId) => collection(db, `${APP_NS}/data/asd/${asdId}/sessioni`);
const msgCol    = (asdId) => collection(db, `${APP_NS}/data/asd/${asdId}/messaggi`);

// ── NAVIGATION ──────────────────────────────────────────────────────────────
window.toggleNav = () => { $('nav-drawer').classList.toggle('open'); $('nav-overlay').classList.toggle('show'); };
window.closeNav  = () => { $('nav-drawer').classList.remove('open'); $('nav-overlay').classList.remove('show'); };
window.closeModal = closeModal;

function setHeader(title, sub='', rightHtml='') {
    $('app-header').style.display = 'flex';
    $('header-title').textContent = title;
    $('header-sub').textContent = sub;
    $('header-right').innerHTML = rightHtml;
}
function hideHeader() { $('app-header').style.display = 'none'; }

function buildNav() {
    let items = '', userName = '';
    if (S.role === 'asd') {
        userName = S.asd?.nome || 'ASD';
        items = [
            { icon:'🏠', label:'Dashboard', fn:"window.setView('asdDashboard')" },
            { icon:'👥', label:'Atleti',    fn:"window.setView('asdAtleti')" },
            { icon:'📊', label:'Statistiche Atleti', fn:"window.setView('asdStats')" },
            { icon:'📨', label:'Messaggi',  fn:"window.setView('asdMessaggi')" },
            { icon:'⚙️', label:'Profilo ASD', fn:"window.setView('asdProfilo')" },
        ].map(n => `<div class="nav-item" onclick="${n.fn};closeNav()">${n.icon} ${n.label}</div>`).join('');
        items += `<div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
            <div class="nav-item" style="color:var(--danger)" onclick="logoutAsd()">🚪 Logout ASD</div>
        </div>`;
    } else if (S.role === 'atleta') {
        userName = `${S.atleta?.nome||''} ${S.atleta?.cognome||''}`;
        items = [
            { icon:'🏠', label:'Menu Principale', fn:"window.setView('atletaMenu')" },
            { icon:'📊', label:'I Miei Dati',     fn:"window.setView('atletaDati')" },
            { icon:'📨', label:'Messaggi',         fn:"window.setView('atletaMessaggi')" },
        ].map(n => `<div class="nav-item" onclick="${n.fn};closeNav()">${n.icon} ${n.label}</div>`).join('');
        items += `<div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
            <div class="nav-item" style="color:var(--danger)" onclick="logoutAtleta()">🚪 Logout</div>
        </div>`;
    }
    $('nav-user-name').textContent = userName;
    $('nav-items').innerHTML = items;
}

// ── INIT ────────────────────────────────────────────────────────────────────
const app = initializeApp(firebaseConfig);
db   = getFirestore(app);
auth = getAuth(app);

onAuthStateChanged(auth, async user => {
    if (!user) await signInAnonymously(auth);
    await loadAllAsd();
    window.setView('homeLogin');
});

async function loadAllAsd() {
    try {
        const snap = await getDocs(asdCol());
        S.allAsd = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) { S.allAsd = []; }
}

// ── VIEWS ROUTER ────────────────────────────────────────────────────────────
window.setView = async (view, params={}) => {
    S.view = view;
    closeNav();
    switch(view) {
        case 'homeLogin':       return renderHomeLogin();
        case 'asdLogin':        return renderAsdLogin(params);
        case 'asdRegister':     return renderAsdRegister();
        case 'asdDashboard':    return renderAsdDashboard();
        case 'asdAtleti':       return renderAsdAtleti();
        case 'asdStats':        return renderAsdStats(params);
        case 'asdAtletaDetail': return renderAsdAtletaDetail(params);
        case 'asdMessaggi':     return renderAsdMessaggi();
        case 'asdProfilo':      return renderAsdProfilo();
        case 'atletaSelect':    return renderAtletaSelect(params);
        case 'atletaLogin':     return renderAtletaLogin(params);
        case 'atletaMenu':      return renderAtletaMenu();
        case 'atletaDati':      return renderAtletaDati();
        case 'atletaMessaggi':  return renderAtletaMessaggi();
        // Tracker views (atleta)
        case 'registrationForm':return renderRegistrationForm(params);
        case 'trainingNotes':   return renderTrainingNotes(params);
        case 'dataSummary':     return renderAtletaDati();
        case 'detailedSummary': return renderDetailedSummary(params);
        default: renderHomeLogin();
    }
};

// ════════════════════════════════════════════════════════════════════════════
// ── HOME LOGIN (scelta ASD o login ASD) ─────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
function renderHomeLogin() {
    hideHeader();
    const tiles = S.allAsd.length === 0
        ? `<p style="text-align:center;color:var(--muted);padding:2rem 0">Nessuna ASD registrata ancora.</p>`
        : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:0.85rem">
            ${S.allAsd.map(asd => `
                <div class="asd-tile" onclick="window.setView('atletaSelect',{asdId:'${asd.id}'})">
                    <div class="asd-logo-wrap">
                        ${asd.logoBase64
                            ? `<img src="${asd.logoBase64}" alt="logo" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
                            : asd.logoUrl
                                ? `<img src="${asd.logoUrl}" alt="logo" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
                                : `<span style="font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--gold)">${(asd.nome||'?').substring(0,2).toUpperCase()}</span>`}
                    </div>
                    <div style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:0.95rem;color:var(--text)">${asd.nome}</div>
                    <div style="font-size:0.72rem;color:var(--muted);margin-top:0.2rem">${asd.citta||''}</div>
                </div>
            `).join('')}
        </div>`;

    render(`
        <div style="text-align:center;padding:2rem 0 1.5rem">
            <div style="font-family:'Rajdhani',sans-serif;font-size:2.4rem;font-weight:700;color:var(--gold);letter-spacing:0.04em;line-height:1">
                🏹 ARCHERY<br><span style="color:var(--text)">CLUB MANAGER</span>
            </div>

window.doAsdRegister = async function() {
    const nome  = $('reg-nome')?.value.trim();
    const citta = $('reg-citta')?.value.trim();
    const pwd   = $('reg-pwd')?.value.trim();
    const pwd2  = $('reg-pwd2')?.value.trim();

    if (!nome) return showModal('Errore','Inserisci il nome della ASD.',[{text:'OK'}]);
    if (!pwd)  return showModal('Errore','Inserisci una password.',[{text:'OK'}]);
    if (pwd.length < 6) return showModal('Errore','Password minimo 6 caratteri.',[{text:'OK'}]);
    if (pwd !== pwd2)   return showModal('Errore','Le password non coincidono.',[{text:'OK'}]);

    await loadAllAsd();
    if (S.allAsd.find(a => a.nome.toLowerCase() === nome.toLowerCase())) {
        return showModal('Errore','Esiste già una ASD con questo nome.',[{text:'OK'}]);
    }

    try {
        const newAsd = { nome, citta: citta||'', pwdHash: hashPwd(pwd), logoUrl: '', createdAt: new Date().toISOString() };
        const ref = await addDoc(asdCol(), newAsd);
        newAsd.id = ref.id;
        S.allAsd.push(newAsd);
        S.role   = 'asd';
        S.asd    = newAsd;
        S.atleti = [];
        localStorage.setItem('acm_asd_session', JSON.stringify({ id: newAsd.id }));
        buildNav();
        showModal('✅ ASD Creata!', `Benvenuto <strong>${nome}</strong>!<br>Il profilo ASD è stato creato con successo.<br><br>Ora puoi aggiungere il logo e iscrivere i tuoi atleti.`, [{
            text: 'Vai al Profilo ASD', cls: 'btn-gold', fn: () => window.setView('asdProfilo')
        }]);
    } catch(e) {
        console.error(e);
        showModal('Errore', 'Errore durante la creazione: ' + e.message, [{text:'OK'}]);
    }
}

async function saveAtleta(existingId=null, existingData=null) {
    const nome            = $('atl-nome')?.value.trim();
    const cognome         = $('atl-cognome')?.value.trim();
    const tesseraFitarco  = $('atl-tessera-fitarco')?.value.trim();
    const tesseraAltro    = $('atl-tessera-altro')?.value.trim();
    const enteAltro       = $('atl-ente-altro')?.value.trim();
    const nascita         = $('atl-nascita')?.value;
    const tipoArco        = $('atl-arco')?.value;
    const pwd             = $('atl-pwd')?.value.trim();
    const wrap            = $('foto-atleta-wrap');
    const fotoBase64      = wrap?._pendingBase64 || existingData?.fotoBase64 || '';

    if (!nome || !cognome) return showModal('Errore','Nome e Cognome obbligatori.',[{text:'OK',fn:()=>showAddAtleta(existingData)}]);
    if (!existingId && !pwd) return showModal('Errore','Imposta una password per l\'atleta.',[{text:'OK',fn:()=>showAddAtleta(existingData)}]);

    const data = { nome, cognome, tesseraFitarco, tesseraAltro, enteAltro, dataNascita: nascita, tipoArco, fotoBase64, updatedAt: new Date().toISOString() };
    if (pwd) data.pwdHash = hashPwd(pwd);

    if (existingId) {
        await updateDoc(doc(db, `${APP_NS}/data/asd/${S.asd.id}/atleti/${existingId}`), data);
    } else {
        data.createdAt = new Date().toISOString();
        await addDoc(atletiCol(S.asd.id), data);
    }
    await loadAtleti();
    window.setView('asdAtleti');
    showModal('✅ Salvato!', `Atleta ${nome} ${cognome} ${existingId?'aggiornato':'creato'} con successo.`,[{text:'OK'}]);
}

async function editAtleta(atletaId) {
    const atl = S.atleti.find(a => a.id === atletaId);
    if (atl) showAddAtleta(atl);
}

async function deleteAtleta(atletaId, nome) {
    showModal('🗑️ Elimina Atleta', `Vuoi eliminare <strong>${nome}</strong>? Tutti i suoi dati verranno cancellati.`, [
        { text:'Annulla', cls:'btn-ghost' },
        { text:'Elimina', cls:'btn-danger', fn: async () => {
            await deleteDoc(doc(db, `${APP_NS}/data/asd/${S.asd.id}/atleti/${atletaId}`));
            await loadAtleti();
            window.setView('asdAtleti');
        }}
    ]);
}

    const totalFrecce = sessioni.reduce((s,x)=>s+(x.frecceAggiuntive||0)+(x.frecceTotali||0),0);
    const avg = sessioni.filter(s=>s.totalScore>0).length > 0
        ? (sessioni.filter(s=>s.totalScore>0).reduce((a,s)=>a+(s.totalScore||0),0) / sessioni.filter(s=>s.totalScore>0).length).toFixed(0)

async function sendMessaggio() {

    await addDoc(msgCol(S.asd.id), { destinatari: dest, testo, esercizi: eserc, mittente:'asd', createdAt: serverTimestamp() });
    showModal('✅ Inviato!','Messaggio inviato con successo.',[{text:'OK', fn:()=>window.setView('asdMessaggi')}]);
}

window.previewLogoFile = function(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) return showModal('Errore','File troppo grande. Max 2MB.',[{text:'OK'}]);
    const reader = new FileReader();
    reader.onload = e => {
        const b64 = e.target.result;
        const wrap = $('logo-preview-wrap');
        wrap.innerHTML = `<img id="logo-preview-img" src="${b64}" style="width:100%;height:100%;object-fit:cover">`;
        wrap._pendingBase64 = b64;
    };
    reader.readAsDataURL(file);
};

window.previewFotoAtleta = function(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) return showModal('Errore','File troppo grande. Max 2MB.',[{text:'OK'}]);
    const reader = new FileReader();
    reader.onload = e => {
        const b64 = e.target.result;
        const prev = $('foto-atleta-preview');
        if (prev) { prev.src = b64; prev.style.display = 'block'; }
        const wrap = $('foto-atleta-wrap');
        if (wrap) wrap._pendingBase64 = b64;
    };
    reader.readAsDataURL(file);
};

window.saveAsdProfilo = async function() {
    const nome  = $('prof-nome')?.value.trim();
    const citta = $('prof-citta')?.value.trim();
    if (!nome) return showModal('Errore','Nome ASD obbligatorio.',[{text:'OK'}]);
    const wrap = $('logo-preview-wrap');
    const logoBase64 = wrap?._pendingBase64 || S.asd?.logoBase64 || '';
    await updateDoc(doc(db,`${APP_NS}/data/asd/${S.asd.id}`), { nome, citta: citta||'', logoBase64 });
    S.asd = { ...S.asd, nome, citta, logoBase64 };
    showModal('✅ Salvato!','Profilo ASD aggiornato.',[{text:'OK',fn:()=>window.setView('asdProfilo')}]);
};
window.saveAsdPwd = async function() {
    const p1 = $('prof-pwd')?.value.trim();
    const p2 = $('prof-pwd2')?.value.trim();
    if (!p1 || p1.length<6) return showModal('Errore','Password minimo 6 caratteri.',[{text:'OK'}]);
    if (p1!==p2) return showModal('Errore','Le password non coincidono.',[{text:'OK'}]);
    await updateDoc(doc(db,`${APP_NS}/data/asd/${S.asd.id}`), { pwdHash: hashPwd(p1) });
    showModal('✅ Password aggiornata!','',[{text:'OK'}]);
};

                    <div style="font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold)">I Miei Dati</div>
                    <div style="font-size:0.75rem;color:var(--muted)">${S.sessioni.length} sessioni</div>
                </button>
                <button class="card card-hover" style="text-align:left;border:1px solid var(--border);cursor:pointer" onclick="window.setView('atletaMessaggi')">
                    <div style="font-size:1.6rem;margin-bottom:0.3rem">📨</div>
                    <div style="font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold)">Messaggi</div>
                    <div style="font-size:0.75rem;color:var(--muted)">Dal tuo coach</div>
                </button>
            </div>
        </div>
    `);
}
window.startSession = (type) => window.setView('registrationForm', { type });

// ════════════════════════════════════════════════════════════════════════════
// ── ATLETA: REGISTRA SESSIONE ────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
function renderRegistrationForm({ type='Allenamento' }) {
    setHeader(`${type==='Gara'?'🏆':'🎯'} Nuova ${type}`, S.asd?.nome||'');
    const today = new Date().toISOString().split('T')[0];
    const distOpts = ['18mt','25mt','40mt','50mt','60mt','70mt'];
    const luogoOpts = ['Indoor','Outdoor'];
    const targaOpts = ['40','60','80','120','Tripla','Tripla Vegas','Field','3D','Altro'];

    render(`
        <button class="btn btn-ghost btn-sm" onclick="window.setView('atletaMenu')" style="margin-bottom:1rem">← Menu</button>
        <h2 style="font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--gold);margin-bottom:1rem">${type==='Gara'?'🏆':'🎯'} Nuov${type==='Gara'?'a':'o'} ${type}</h2>

        <div class="form-section">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.65rem">
                <div><label class="form-label">Data</label><input class="inp" id="sess-data" type="date" value="${today}"></div>
                <div><label class="form-label">Luogo</label><input class="inp" id="sess-luogo" placeholder="Es: Campo ASD"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.65rem;margin-top:0.65rem">
                <div><label class="form-label">Indoor/Outdoor</label>
                    <select class="inp" id="sess-tipoLuogo">${luogoOpts.map(o=>`<option>${o}</option>`).join('')}</select></div>
                <div><label class="form-label">Distanza</label>
                    <select class="inp" id="sess-distanza">${distOpts.map(o=>`<option>${o}</option>`).join('')}</select></div>
            </div>
            <div style="margin-top:0.65rem"><label class="form-label">Tipo Targa</label>
                <select class="inp" id="sess-targa">${targaOpts.map(o=>`<option>${o}</option>`).join('')}</select></div>
        </div>

        ${type === 'Allenamento' ? `
        <div class="form-section">
            <label class="form-label">🎯 Esercizi Consigliati (dal coach)</label>
            <textarea class="inp" id="sess-eserc-cons" rows="2" placeholder="Esercizi ricevuti dal tuo allenatore..."></textarea>
            <label class="form-label" style="margin-top:0.65rem">✅ Esercizi Svolti <span style="color:var(--muted);font-size:0.75rem">(opzionale)</span></label>
            <textarea class="inp" id="sess-eserc-svolti" rows="2" placeholder="Descrivi cosa hai praticato..."></textarea>
        </div>` : `
        <div class="form-section">
            <label class="form-label">📝 Note Pre-Gara</label>
            <textarea class="inp" id="sess-note-pre" rows="2" placeholder="Preparazione, obiettivi..."></textarea>
            <label class="form-label" style="margin-top:0.65rem">📝 Note Post-Gara</label>
            <textarea class="inp" id="sess-note-post" rows="2" placeholder="Come è andata, cosa migliorare..."></textarea>
        </div>`}

        <div class="form-section">
            <label class="form-label">🩺 Note e Condizioni Fisiche</label>
            <textarea class="inp" id="sess-note-fisiche" rows="2" placeholder="Stanchezza, dolori, meteo, stato mentale..."></textarea>
            <label class="form-label" style="margin-top:0.65rem">🪃 Frecce Tirate</label>
            <input class="inp" id="sess-frecce" type="number" min="0" max="500" placeholder="Quante frecce hai tirato?">
        </div>

        ${type === 'Gara' ? `
        <div class="form-section">
            <label class="form-label">🏆 Punteggio Finale</label>
            <input class="inp" id="sess-punteggio" type="number" min="0" placeholder="Punteggio totale">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem;margin-top:0.5rem">
                <div><label class="form-label">X</label><input class="inp" id="sess-x" type="number" min="0" placeholder="0"></div>
                <div><label class="form-label">10</label><input class="inp" id="sess-ten" type="number" min="0" placeholder="0"></div>
                <div><label class="form-label">9</label><input class="inp" id="sess-nine" type="number" min="0" placeholder="0"></div>
            </div>
        </div>` : ''}

        <button class="btn btn-gold btn-full btn-lg" onclick="saveSession('${type}')">💾 Salva ${type}</button>
    `);
}

async function saveSession(type) {
    const data = {
        archerId: S.atleta.id,
        arciere: `${S.atleta.nome} ${S.atleta.cognome}`,
        type,
        data: $('sess-data')?.value || new Date().toISOString().split('T')[0],
        luogo: $('sess-luogo')?.value.trim()||'',
        tipoLuogo: $('sess-tipoLuogo')?.value||'',
        distanza: $('sess-distanza')?.value||'',
        tipoTarga: $('sess-targa')?.value||'',
        noteCondizioniFisiche: $('sess-note-fisiche')?.value.trim()||'',
        frecceAggiuntive: parseInt($('sess-frecce')?.value)||0,
        totalScore: 0, totalX: 0, totalTen: 0, totalNine: 0, totalAverage: 0,
        timestamp: serverTimestamp(),
        createdAt: new Date().toISOString(),
    };
    if (type === 'Allenamento') {
        data.esercizConsigliati = $('sess-eserc-cons')?.value.trim()||'';
        data.esercizSvolti      = $('sess-eserc-svolti')?.value.trim()||'';
    } else {
        data.notePreGara  = $('sess-note-pre')?.value.trim()||'';
        data.notePostGara = $('sess-note-post')?.value.trim()||'';
        data.totalScore = parseInt($('sess-punteggio')?.value)||0;
        data.totalX   = parseInt($('sess-x')?.value)||0;
        data.totalTen = parseInt($('sess-ten')?.value)||0;
        data.totalNine= parseInt($('sess-nine')?.value)||0;
    }
    await addDoc(sessioniCol(S.asd.id), data);
    await loadAtletaSessioni();
    showModal('✅ Salvato!', `${type} registrat${type==='Gara'?'a':'o'} con successo!`, [{text:'OK', fn:()=>window.setView('atletaMenu')}]);
}
window.saveSession = saveSession;

// ════════════════════════════════════════════════════════════════════════════
// ── ATLETA: I MIEI DATI ──────────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
async function renderAtletaDati() {
    setHeader('📊 I Miei Dati', S.atleta ? `${S.atleta.nome} ${S.atleta.cognome}` : '');
    await loadAtletaSessioni();

    const totalScore = S.sessioni.reduce((s,x)=>s+(x.totalScore||0),0);
    const totalFrecce= S.sessioni.reduce((s,x)=>s+(x.frecceAggiuntive||0),0);
    const garaList = S.sessioni.filter(s=>s.type==='Gara');
    const bestScore = garaList.length > 0 ? Math.max(...garaList.map(s=>s.totalScore||0)) : 0;

    const sessList = S.sessioni.length === 0
        ? `<p style="text-align:center;color:var(--muted);padding:2rem">Nessuna sessione registrata.</p>`
        : S.sessioni.map(s => `
            <div class="session-card" onclick="showAtletaSessionDetail('${s.id}')" style="cursor:pointer">
                <div style="display:flex;justify-content:space-between;align-items:flex-start">
                    <div>
                        <span class="badge ${s.type==='Gara'?'badge-gold':'badge-blue'}">${s.type||'Allenamento'}</span>
                        <div style="font-family:'Rajdhani',sans-serif;font-weight:700;margin-top:0.3rem">${fmtDate(s.data)}</div>
                        <div style="font-size:0.78rem;color:var(--muted)">${s.luogo||''} ${s.distanza?'· '+s.distanza:''}</div>
                    </div>
                    ${s.totalScore > 0 ? `<div style="text-align:right"><div style="font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--gold-light)">${s.totalScore}</div><div style="font-size:0.72rem;color:var(--muted)">punti</div></div>` : `<div style="font-size:0.78rem;color:var(--muted)">Solo tecnico</div>`}
                </div>
            </div>
        `).join('');

    render(`
        <button class="btn btn-ghost btn-sm" onclick="window.setView('atletaMenu')" style="margin-bottom:1rem">← Menu</button>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin-bottom:1.25rem">
            <div class="stat-box"><div class="stat-num">${S.sessioni.length}</div><div class="stat-label">Sessioni</div></div>
            <div class="stat-box"><div class="stat-num">${totalFrecce}</div><div class="stat-label">Frecce</div></div>
            <div class="stat-box"><div class="stat-num">${bestScore||'—'}</div><div class="stat-label">Best</div></div>
        </div>
        <div class="gold-line"></div>
        <h3 style="font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold);margin-bottom:0.75rem">📋 Sessioni</h3>
        ${sessList}
    `);
}

async function showAtletaSessionDetail(sessionId) {
    const s = S.sessioni.find(x=>x.id===sessionId);
    if (!s) return;
    showModal(`${fmtDate(s.data)} — ${s.type}`, `
        <div style="font-size:0.85rem;display:flex;flex-direction:column;gap:0.5rem">
            ${s.totalScore>0?`<div><strong style="color:var(--gold)">Punteggio:</strong> ${s.totalScore} | X:${s.totalX||0} | 10:${s.totalTen||0} | 9:${s.totalNine||0}</div>`:''}
            ${s.distanza?`<div><strong style="color:var(--gold)">Distanza:</strong> ${s.distanza}</div>`:''}
            ${s.luogo?`<div><strong style="color:var(--gold)">Luogo:</strong> ${s.luogo}</div>`:''}
            ${s.frecceAggiuntive>0?`<div><strong style="color:var(--gold)">Frecce:</strong> ${s.frecceAggiuntive}</div>`:''}
            ${s.esercizConsigliati?`<div><strong style="color:var(--gold)">Esercizi consigliati:</strong><br>${s.esercizConsigliati}</div>`:''}
            ${s.esercizSvolti?`<div><strong style="color:var(--gold)">Esercizi svolti:</strong><br>${s.esercizSvolti}</div>`:''}
            ${s.notePreGara?`<div><strong style="color:var(--gold)">Note pre-gara:</strong><br>${s.notePreGara}</div>`:''}
            ${s.notePostGara?`<div><strong style="color:var(--gold)">Note post-gara:</strong><br>${s.notePostGara}</div>`:''}
            ${s.noteCondizioniFisiche?`<div><strong style="color:var(--gold)">Note fisiche:</strong><br>${s.noteCondizioniFisiche}</div>`:''}
        </div>
    `, [{text:'Chiudi', cls:'btn-ghost'}]);
}
window.showAtletaSessionDetail = showAtletaSessionDetail;

// ════════════════════════════════════════════════════════════════════════════
// ── ATLETA: MESSAGGI (ricevuti) ──────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
async function renderAtletaMessaggi() {
    setHeader('📨 Messaggi', 'Dal tuo Coach');
    const snap = await getDocs(query(msgCol(S.asd.id), orderBy('createdAt','desc')));
    const msgs = snap.docs.map(d=>({id:d.id,...d.data()}))
        .filter(m => m.destinatari === 'tutti' || m.destinatari === S.atleta.id);

    const list = msgs.length === 0
        ? `<p style="text-align:center;color:var(--muted);padding:2rem">Nessun messaggio dal coach.</p>`
        : msgs.map(m=>`
            <div class="msg-recv" style="margin-bottom:0.75rem">
                <div style="font-size:0.72rem;color:var(--muted);margin-bottom:0.3rem">
                    ${m.destinatari==='tutti'?'📢 Messaggio a tutto il gruppo':'📩 Messaggio per te'} · ${m.createdAt?new Date(m.createdAt.seconds*1000).toLocaleDateString('it'):''}
                </div>
                <div style="font-size:0.9rem">${m.testo}</div>
                ${m.esercizi?`<div style="margin-top:0.5rem;padding:0.5rem;background:rgba(201,162,39,0.08);border-radius:8px;font-size:0.82rem"><strong style="color:var(--gold)">🎯 Esercizi:</strong><br>${m.esercizi}</div>`:''}
            </div>
        `).join('');

    render(`
        <button class="btn btn-ghost btn-sm" onclick="window.setView('atletaMenu')" style="margin-bottom:1rem">← Menu</button>
        <h2 style="font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;color:var(--gold);margin-bottom:1rem">📨 Messaggi dal Coach</h2>
        ${list}
    `);
}

// ════════════════════════════════════════════════════════════════════════════
// ── AUTO-RESTORE SESSION ─────────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
async function tryRestoreSession() {
    // Try ASD session first
    const asdSess = JSON.parse(localStorage.getItem('acm_asd_session')||'null');
    if (asdSess?.id) {
        await loadAllAsd();
        const found = S.allAsd.find(a=>a.id===asdSess.id);
        if (found) {
            S.role = 'asd'; S.asd = found;
            await loadAtleti();
            buildNav();
            window.setView('asdDashboard');
            return true;
        } else { localStorage.removeItem('acm_asd_session'); }
    }
    // Try atleta session
    const atlSess = JSON.parse(localStorage.getItem('acm_atleta_session')||'null');
    if (atlSess?.asdId && atlSess?.atletaId) {
        await loadAllAsd();
        const asd = S.allAsd.find(a=>a.id===atlSess.asdId);
        if (asd) {
            S.asd = asd;
            const snap = await getDocs(atletiCol(asd.id));
            const atl = snap.docs.map(d=>({id:d.id,...d.data()})).find(a=>a.id===atlSess.atletaId);
            if (atl) {
                S.role = 'atleta'; S.atleta = atl;
                buildNav();
                await loadAtletaSessioni();
                window.setView('atletaMenu');
                return true;
            }
        }
        localStorage.removeItem('acm_atleta_session');
    }
    return false;
}

// ── Override initial load ───────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
    if (!user) await signInAnonymously(auth);
    await loadAllAsd();
    const restored = await tryRestoreSession();
    if (!restored) window.setView('homeLogin');
});

window.renderAsdDashboard = renderAsdDashboard;
window.renderAsdAtleti    = renderAsdAtleti;
window.renderAsdStats     = renderAsdStats;
window.renderAsdMessaggi  = renderAsdMessaggi;
window.renderAsdProfilo   = renderAsdProfilo;

</script>
</body>
