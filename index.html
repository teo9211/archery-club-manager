<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archery Club Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gold: #c9a227;
            --gold-light: #f0c040;
            --dark: #0f0f0f;
            --dark2: #1a1a1a;
            --dark3: #242424;
            --dark4: #2e2e2e;
            --border: #3a3a3a;
            --text: #e8e0d0;
            --muted: #888;
            --success: #3d9970;
            --danger: #c0392b;
            --info: #2980b9;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
        }
        h1, h2, h3, .display { font-family: 'Rajdhani', sans-serif; }

        /* ── BACKGROUND TEXTURE ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,162,39,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(201,162,39,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── INPUTS ── */
        .inp {
            background: var(--dark3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.65rem 0.9rem;
            border-radius: 8px;
            width: 100%;
            font-family: 'Exo 2', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .inp:focus { outline: none; border-color: var(--gold); }
        .inp::placeholder { color: #555; }
        select.inp { cursor: pointer; }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
            padding: 0.65rem 1.2rem; border-radius: 8px;
            font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700;
            cursor: pointer; border: none; transition: all 0.15s;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
            letter-spacing: 0.02em;
        }
        .btn-gold { background: var(--gold); color: #0f0f0f; }
        .btn-gold:hover { background: var(--gold-light); transform: scale(1.02); }
        .btn-gold:active { transform: scale(0.98); }
        .btn-outline { background: transparent; color: var(--gold); border: 1.5px solid var(--gold); }
        .btn-outline:hover { background: rgba(201,162,39,0.08); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #e74c3c; }
        .btn-ghost { background: var(--dark3); color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
        .btn-success { background: var(--success); color: white; }
        .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.85rem; }
        .btn-lg { padding: 0.85rem 1.6rem; font-size: 1.1rem; min-height: 52px; }
        .btn-full { width: 100%; }

        /* ── CARDS ── */
        .card {
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.2rem;
        }
        .card-gold { border-color: var(--gold); }
        .card-hover { cursor: pointer; transition: all 0.2s; }
        .card-hover:hover { border-color: var(--gold); background: var(--dark3); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,162,39,0.1); }

        /* ── GOLD DIVIDER ── */
        .gold-line { height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 1.2rem 0; }

        /* ── BADGE ── */
        .badge { display: inline-block; padding: 0.2rem 0.7rem; border-radius: 99px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
        .badge-gold { background: rgba(201,162,39,0.15); color: var(--gold-light); border: 1px solid rgba(201,162,39,0.3); }
        .badge-green { background: rgba(61,153,112,0.15); color: #5dba94; border: 1px solid rgba(61,153,112,0.3); }
        .badge-blue { background: rgba(41,128,185,0.15); color: #5daadc; border: 1px solid rgba(41,128,185,0.3); }
        .badge-red { background: rgba(192,57,43,0.15); color: #e07060; border: 1px solid rgba(192,57,43,0.3); }

        /* ── TABS ── */
        .tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        .tab { flex: 1; padding: 0.6rem 0.5rem; text-align: center; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.9rem; transition: all 0.15s; color: var(--muted); background: var(--dark2); border: none; letter-spacing: 0.02em; }
        .tab.active { background: var(--gold); color: #0f0f0f; }
        .tab:not(.active):hover { background: var(--dark3); color: var(--text); }

        /* ── MODAL ── */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
        #modal-overlay.show { display: flex; }
        .modal-box { background: var(--dark2); border: 1.5px solid var(--gold); border-radius: 16px; padding: 1.5rem; max-width: 440px; width: 100%; max-height: 90vh; overflow-y: auto; }

        /* ── STAT BOX ── */
        .stat-box { background: var(--dark3); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem 1rem; text-align: center; }
        .stat-num { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--gold-light); line-height: 1; }
        .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }

        /* ── HEADER ── */
        .app-header { background: var(--dark2); border-bottom: 1px solid var(--border); padding: 0.75rem 1rem; display: flex; align-items: center; gap: 0.75rem; position: sticky; top: 0; z-index: 100; }
        .app-header .logo-text { font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--gold); letter-spacing: 0.04em; line-height: 1; }
        .app-header .sub-text { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }

        /* ── ARCHER AVATAR ── */
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--dark3); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); flex-shrink: 0; }
        .avatar-lg { width: 64px; height: 64px; font-size: 1.5rem; }
        .avatar-xl { width: 80px; height: 80px; font-size: 2rem; }

        /* ── ASD CARD (login screen) ── */
        .asd-tile { background: var(--dark2); border: 1.5px solid var(--border); border-radius: 16px; padding: 1.4rem 1rem; cursor: pointer; transition: all 0.2s; text-align: center; }
        .asd-tile:hover { border-color: var(--gold); background: var(--dark3); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(201,162,39,0.12); }
        .asd-logo-wrap { width: 72px; height: 72px; border-radius: 50%; background: var(--dark3); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; margin: 0 auto 0.75rem; overflow: hidden; }
        .asd-logo-wrap img { width: 100%; height: 100%; object-fit: cover; }

        /* ── MESSAGE BUBBLES ── */
        .msg-sent { background: rgba(201,162,39,0.12); border: 1px solid rgba(201,162,39,0.25); border-radius: 12px 12px 4px 12px; padding: 0.6rem 0.9rem; margin-left: auto; max-width: 85%; }
        .msg-recv { background: var(--dark3); border: 1px solid var(--border); border-radius: 12px 12px 12px 4px; padding: 0.6rem 0.9rem; max-width: 85%; }

        /* ── SCORE GRID ── */
        .score-tbl th, .score-tbl td { border: 1px solid var(--border); padding: 0.35rem 0.4rem; text-align: center; font-size: 0.82rem; }
        .score-tbl th { background: var(--dark3); color: var(--gold); font-family: 'Rajdhani', sans-serif; }

        /* ── ANIMATIONS ── */
        @keyframes fadeSlide { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
        .anim { animation: fadeSlide 0.28s ease both; }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            .stat-num { font-size: 1.4rem; }
            input, select, textarea { font-size: 16px !important; }
        }

        /* ── NAV DRAWER ── */
        #nav-drawer { position: fixed; top: 0; left: 0; height: 100%; width: 280px; background: var(--dark2); border-right: 1px solid var(--border); z-index: 150; transform: translateX(-100%); transition: transform 0.3s ease; overflow-y: auto; }
        #nav-drawer.open { transform: translateX(0); }
        #nav-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 149; }
        #nav-overlay.show { display: block; }
        .nav-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.75rem 1rem; border-radius: 8px; cursor: pointer; transition: all 0.15s; font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.95rem; color: var(--muted); letter-spacing: 0.02em; }
        .nav-item:hover { background: var(--dark3); color: var(--text); }
        .nav-item.active { background: rgba(201,162,39,0.12); color: var(--gold); }

        /* ── LOADING ── */
        .spinner { width: 40px; height: 40px; border: 3px solid var(--dark3); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── FORM SECTION ── */
        .form-section { background: var(--dark3); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.78rem; color: var(--gold); font-weight: 600; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.04em; }

        /* ── SESSION CARD ── */
        .session-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; transition: border-color 0.2s; }
        .session-card:hover { border-color: rgba(201,162,39,0.4); }
    </style>
</head>
<body>

<!-- NAV OVERLAY -->
<div id="nav-overlay" onclick="closeNav()"></div>

<!-- NAV DRAWER -->
<div id="nav-drawer">
    <div style="padding:1rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border)">
            <div>
                <div style="font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:var(--gold)">🏹 Archery Club</div>
                <div id="nav-user-name" style="font-size:0.72rem;color:var(--muted)"></div>
            </div>
            <button onclick="closeNav()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem">✕</button>
        </div>
        <div id="nav-items"></div>
    </div>
</div>

<!-- APP HEADER -->
<div class="app-header" id="app-header" style="display:none">
    <button id="back-btn" onclick="window._navGoBack()" style="background:none;border:none;color:var(--gold);cursor:pointer;padding:2px;font-size:1.2rem;display:none;margin-right:2px" title="Torna indietro">◀</button>
    <button onclick="toggleNav()" style="background:none;border:none;color:var(--gold);cursor:pointer;padding:2px;font-size:1.4rem">☰</button>
    <div style="flex:1">
        <div class="logo-text" id="header-title">Archery Club Manager</div>
        <div class="sub-text" id="header-sub"></div>
    </div>
    <div id="header-right"></div>
</div>

<!-- MAIN CONTENT -->
<div id="main-view" style="max-width:600px;margin:0 auto;padding:1rem 1rem 5rem">
    <div style="display:flex;justify-content:center;align-items:center;min-height:60vh">
        <div class="spinner"></div>
    </div>
</div>

<!-- MAGNIFIER -->
<div id="test-magnifier" style="position:fixed;width:220px;height:220px;border:4px solid #f97316;border-radius:50%;pointer-events:none;display:none;z-index:9999;background-repeat:no-repeat;box-shadow:0 0 0 9999px rgba(0,0,0,0.45),0 10px 40px rgba(0,0,0,0.8)">
    <div style="position:absolute;top:0;left:50%;width:2px;height:100%;background:white;mix-blend-mode:difference;transform:translateX(-50%)"></div>
    <div style="position:absolute;top:50%;left:0;width:100%;height:2px;background:white;mix-blend-mode:difference;transform:translateY(-50%)"></div>
    <div style="position:absolute;top:50%;left:50%;width:18px;height:18px;border:2px solid white;border-radius:50%;mix-blend-mode:difference;transform:translate(-50%,-50%)"></div>
</div>

<!-- TARGET OVERLAY -->
<div id="target-overlay" style="display:none;position:fixed;inset:0;z-index:500;background:#0f172a;overflow-y:auto;padding:12px 12px 80px">
    <div style="position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;background:#0f172a;padding:8px 0 10px;border-bottom:1px solid #334155;margin-bottom:12px">
        <button onclick="window.closeTargetOverlay()" style="display:flex;align-items:center;gap:6px;padding:8px 14px;background:#1e293b;color:#fff;font-weight:700;border:1px solid #475569;border-radius:10px;cursor:pointer;font-size:13px">← Segnapunti</button>
        <span id="overlay-turn-info" style="color:#fdb927;font-size:14px;font-weight:700"></span>
        <span id="overlay-score-info" style="margin-left:auto;color:#fff;font-size:14px;font-weight:700"></span>
    </div>
    <div id="target-overlay-content"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
    <div class="modal-box">
        <h3 id="modal-title" style="font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--gold);margin-bottom:0.75rem"></h3>
        <div id="modal-body" style="margin-bottom:1rem;font-size:0.9rem"></div>
        <div id="modal-actions" style="display:flex;gap:0.5rem;justify-content:flex-end;flex-wrap:wrap"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
import { getFirestore, doc, addDoc, deleteDoc, getDoc, setDoc, onSnapshot, collection, query, where, getDocs, serverTimestamp, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

// ── FIREBASE CONFIG (test project) ─────────────────────────────────────────
const firebaseConfig = {
    apiKey: "AIzaSyApNQmWNdkuDFYsM_wTFZ9TNBfe_FgUo_c",
    authDomain: "webappasd-47443.firebaseapp.com",
    projectId: "webappasd-47443",
    storageBucket: "webappasd-47443.firebasestorage.app",
    messagingSenderId: "959832767060",
    appId: "1:959832767060:web:1c356fe08f6b7402a2cbc1"
};
const APP_NS = 'club_manager_v1'; // namespace separato dalla webapp originale

// ── STATE ───────────────────────────────────────────────────────────────────
let db, auth;
const S = {
    view: 'loading',
    role: null,          // 'asd' | 'atleta' | null
    asd: null,           // { id, nome, email, ... }
    atleta: null,        // { id, nome, cognome, ... }
    allAsd: [],
    atleti: [],          // atleti della ASD corrente
    sessioni: [],        // sessioni atleta
    messaggi: [],
};

// ── HELPERS ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const render = html => { $('main-view').innerHTML = `<div class="anim">${html}</div>`; };
function showModal(title, bodyHtml, actions=[]) {
    $('modal-title').textContent = title;
    $('modal-body').innerHTML = bodyHtml;
    $('modal-actions').innerHTML = '';
    actions.forEach(a => {
        const b = document.createElement('button');
        b.className = 'btn ' + (a.cls || 'btn-ghost');
        b.textContent = a.text;
        b.onclick = () => { closeModal(); a.fn?.(); };
        $('modal-actions').appendChild(b);
    });
    $('modal-overlay').classList.add('show');
}
function closeModal() { $('modal-overlay').classList.remove('show'); }
function hashPwd(s) {
    // Simple deterministic hash (for demo — in production use bcrypt server-side)
    let h = 0;
    for (let i = 0; i < s.length; i++) { h = (Math.imul(31, h) + s.charCodeAt(i)) | 0; }
    return 'h_' + Math.abs(h).toString(36);
}
function fmtDate(d) {
    if (!d) return 'N/D';
    const p = d.split('-');
    return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : d;
}
function initials(nome, cognome) {
    return ((nome||'?')[0] + (cognome||'?')[0]).toUpperCase();
}
function logoOrInitials(asd, size='asd-logo-wrap') {
    if (asd.logoUrl) return `<img src="${asd.logoUrl}" alt="logo" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    return `<span style="font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--gold)">${(asd.nome||'?').substring(0,2).toUpperCase()}</span>`;
}

// ── FIRESTORE REFS ──────────────────────────────────────────────────────────
const asdCol    = ()  => collection(db, `${APP_NS}/data/asd`);
const atletiCol = (asdId) => collection(db, `${APP_NS}/data/asd/${asdId}/atleti`);
const sessioniCol = (asdId, atletaId) => collection(db, `${APP_NS}/data/asd/${asdId}/sessioni`);
const msgCol    = (asdId) => collection(db, `${APP_NS}/data/asd/${asdId}/messaggi`);

// ── NAVIGATION ──────────────────────────────────────────────────────────────
window.toggleNav = () => { $('nav-drawer').classList.toggle('open'); $('nav-overlay').classList.toggle('show'); };
window.closeNav  = () => { $('nav-drawer').classList.remove('open'); $('nav-overlay').classList.remove('show'); };
window.closeModal = closeModal;

function setHeader(title, sub='', rightHtml='') {
    $('app-header').style.display = 'flex';
    $('header-title').textContent = title;
    $('header-sub').textContent = sub;
    $('header-right').innerHTML = rightHtml;
    // Mostra freccia indietro se c'è storia di navigazione
    const backBtn = $('back-btn');
    if (backBtn) backBtn.style.display = (window._navHistory&&window._navHistory.length>1)?'inline-block':'none';
}
function hideHeader() {
    $('app-header').style.display = 'none';
    const backBtn = $('back-btn');
    if (backBtn) backBtn.style.display = 'none';
}

function buildNav() {
    let items = '', userName = '';
    if (S.role === 'asd') {
        userName = S.asd?.nome || 'ASD';
        items = [
            { icon:'🏠', label:'Dashboard', fn:"window.setView('asdDashboard')" },
            { icon:'👥', label:'Atleti',    fn:"window.setView('asdAtleti')" },
            { icon:'📊', label:'Statistiche Atleti', fn:"window.setView('asdStats')" },
            { icon:'📨', label:'Messaggi',  fn:"window.setView('asdMessaggi')" },
            { icon:'⚙️', label:'Profilo ASD', fn:"window.setView('asdProfilo')" },
        ].map(n => `<div class="nav-item" onclick="${n.fn};closeNav()">${n.icon} ${n.label}</div>`).join('');
        items += `<div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
            <div class="nav-item" style="color:var(--danger)" onclick="logoutAsd()">🚪 Logout ASD</div>
        </div>`;
    } else if (S.role === 'atleta') {
        userName = `${S.atleta?.nome||''} ${S.atleta?.cognome||''}`;
        items = [
            { icon:'🏠', label:'Menu',              fn:"window.setView('atletaMenu')" },

            { icon:'🎯', label:'Stat. Bersaglio',   fn:"window.setView('targetStats')" },
            { icon:'🏅', label:'Obiettivi',         fn:"window.setView('atletaObiettivi')" },
            { icon:'⚖️', label:'Confronta',         fn:"window.setView('confrontaSessioni')" },
            { icon:'🪃', label:'Contatore Frecce',  fn:"window.setView('contatoreFrecce')" },
            { icon:'📅', label:'Calendario',        fn:"window.setView('atletaCalendario')" },
            { icon:'🏹', label:'Materiale',         fn:"window.setView('atletaMateriale')" },
            { icon:'📥', label:'Esporta & Backup',  fn:"window.setView('esportaDati')" },
            { icon:'⚙️', label:'Impostazioni',      fn:"window.setView('impostazioni')" },
            { icon:'📨', label:'Messaggi',          fn:"window.setView('atletaMessaggi')" },
        ].map(n => `<div class="nav-item" onclick="${n.fn};closeNav()">${n.icon} ${n.label}</div>`).join('');
        items += `<div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
            <div class="nav-item" style="color:var(--danger)" onclick="logoutAtleta()">🚪 Logout</div>
        </div>`;
    }
    $('nav-user-name').textContent = userName;
    $('nav-items').innerHTML = items;
}

// ── INIT ────────────────────────────────────────────────────────────────────
const app = initializeApp(firebaseConfig);
db   = getFirestore(app);
auth = getAuth(app);

onAuthStateChanged(auth, async user => {
    if (!user) await signInAnonymously(auth);
    await loadAllAsd();
    window.setView('homeLogin');
});

async function loadAllAsd() {
    try {
        const snap = await getDocs(asdCol());
        S.allAsd = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) { S.allAsd = []; }
}

// ── VIEWS ROUTER ────────────────────────────────────────────────────────────
// Stack di navigazione per il tasto indietro
window._navHistory = [];
window._navGoBack = () => {
    if (window._navHistory.length > 1) {
        window._navHistory.pop(); // rimuovi corrente
        const prev = window._navHistory.pop(); // prendi precedente
        window.setView(prev.view, prev.params);
    } else {
        // fallback intelligente
        if (S.role === 'atleta') window.setView('atletaMenu');
        else if (S.role === 'asd') window.setView('asdDashboard');
        else window.setView('homeLogin');
    }
};

window.setView = async (view, params={}) => {
    S.view = view;
    // Aggiungi allo stack (evita duplicati consecutivi)
    const last = window._navHistory[window._navHistory.length-1];
    if (!last || last.view !== view) {
        window._navHistory.push({view, params});
        if (window._navHistory.length > 20) window._navHistory.shift();
    }
    closeNav();
    switch(view) {
        case 'homeLogin':       return renderHomeLogin();
        case 'asdLogin':        return renderAsdLogin(params);
        case 'asdRegister':     return renderAsdRegister();
        case 'asdDashboard':    return renderAsdDashboard();
        case 'asdAtleti':       return renderAsdAtleti();
        case 'asdStats':        return renderAsdStats(params);
        case 'asdAtletaDetail': return renderAsdAtletaDetail(params);
        case 'asdMessaggi':     return renderAsdMessaggi();
        case 'asdProfilo':      return renderAsdProfilo();
        case 'atletaSelect':    return renderAtletaSelect(params);
        case 'atletaLogin':     return renderAtletaLogin(params);
        case 'atletaMenu':      return renderAtletaMenu();
        case 'atletaDati':      return renderAtletaDati();
        case 'atletaMessaggi':  return renderAtletaMessaggi();
        // Tracker views (atleta)
        case 'registrationForm':return renderRegistrationForm(params);
        case 'trainingNotes':   return renderTrainingNotes();
        case 'scoring':         return tkRenderScoring();
        case 'quickScore':      return renderQuickScoreView();
        case 'dataSummary':        return renderAtletaDati();
        case 'detailedSummary':    return renderDettaglioSessione(params);
        case 'atletaCalendario':   return renderAtletaCalendario();
        case 'atletaMateriale':    return renderAtletaMateriale();
        case 'targetStats':        return renderTargetStats();
        case 'atletaObiettivi':    return renderAtletaObiettivi();
        case 'confrontaSessioni':  return renderConfronta();
        case 'contatoreFrecce':    return renderContatoreFrecce();
        case 'esportaDati':        return renderEsportaDati();
        case 'impostazioni':       return renderImpostazioni();
        default: renderHomeLogin();
    }
};

window.doAsdRegister = async function() {
    const nome  = $('reg-nome')?.value.trim();
    const citta = $('reg-citta')?.value.trim();
    const pwd   = $('reg-pwd')?.value.trim();
    const pwd2  = $('reg-pwd2')?.value.trim();

    if (!nome) return showModal('Errore','Inserisci il nome della ASD.',[{text:'OK'}]);
    if (!pwd)  return showModal('Errore','Inserisci una password.',[{text:'OK'}]);
    if (pwd.length < 6) return showModal('Errore','Password minimo 6 caratteri.',[{text:'OK'}]);
    if (pwd !== pwd2)   return showModal('Errore','Le password non coincidono.',[{text:'OK'}]);

    await loadAllAsd();
    if (S.allAsd.find(a => a.nome.toLowerCase() === nome.toLowerCase())) {
        return showModal('Errore','Esiste già una ASD con questo nome.',[{text:'OK'}]);
    }

    try {
        const newAsd = { nome, citta: citta||'', pwdHash: hashPwd(pwd), logoUrl: '', createdAt: new Date().toISOString() };
        const ref = await addDoc(asdCol(), newAsd);
        newAsd.id = ref.id;
        S.allAsd.push(newAsd);
        S.role   = 'asd';
        S.asd    = newAsd;
        S.atleti = [];
        localStorage.setItem('acm_asd_session', JSON.stringify({ id: newAsd.id }));
        buildNav();
        showModal('✅ ASD Creata!', `Benvenuto <strong>${nome}</strong>!<br>Il profilo ASD è stato creato con successo.<br><br>Ora puoi aggiungere il logo e iscrivere i tuoi atleti.`, [{
            text: 'Vai al Profilo ASD', cls: 'btn-gold', fn: () => window.setView('asdProfilo')
        }]);
    } catch(e) {
        console.error(e);
        showModal('Errore', 'Errore durante la creazione: ' + e.message, [{text:'OK'}]);
    }
}

async function saveAtleta(existingId=null, existingData=null) {
    const nome            = $('atl-nome')?.value.trim();
    const cognome         = $('atl-cognome')?.value.trim();
    const tesseraFitarco  = $('atl-tessera-fitarco')?.value.trim();
    const tesseraAltro    = $('atl-tessera-altro')?.value.trim();
    const enteAltro       = $('atl-ente-altro')?.value.trim();
    const nascita         = $('atl-nascita')?.value;
    const tipoArco        = $('atl-arco')?.value;
    const pwd             = $('atl-pwd')?.value.trim();
    const wrap            = $('foto-atleta-wrap');
    const fotoBase64      = wrap?._pendingBase64 || existingData?.fotoBase64 || '';

    if (!nome || !cognome) return showModal('Errore','Nome e Cognome obbligatori.',[{text:'OK',fn:()=>showAddAtleta(existingData)}]);
    if (!existingId && !pwd) return showModal('Errore','Imposta una password per l\'atleta.',[{text:'OK',fn:()=>showAddAtleta(existingData)}]);

    const data = { nome, cognome, tesseraFitarco, tesseraAltro, enteAltro, dataNascita: nascita, tipoArco, fotoBase64, updatedAt: new Date().toISOString() };
    if (pwd) data.pwdHash = hashPwd(pwd);

    if (existingId) {
        await updateDoc(doc(db, `${APP_NS}/data/asd/${S.asd.id}/atleti/${existingId}`), data);
    } else {
        data.createdAt = new Date().toISOString();
        await addDoc(atletiCol(S.asd.id), data);
    }
    await loadAtleti();
    window.setView('asdAtleti');
    showModal('✅ Salvato!', `Atleta ${nome} ${cognome} ${existingId?'aggiornato':'creato'} con successo.`,[{text:'OK'}]);
}

async function editAtleta(atletaId) {
    const atl = S.atleti.find(a => a.id === atletaId);
    if (atl) showAddAtleta(atl);

async function renderAsdAtletaDetail({ atletaId }) {
    const atl = S.atleti.find(a => a.id === atletaId) || {};
    setHeader(`${atl.nome||''} ${atl.cognome||''}`, 'Dettaglio atleta');

    const snap = await getDocs(query(sessioniCol(S.asd.id), where('archerId','==',atletaId)));
    const sessioni = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.data||'').localeCompare(a.data||''));

    const scored = sessioni.filter(s=>!s.trainingWithoutScore&&(s.totalScore||0)>0);
    const totalScore = scored.reduce((s,x)=>s+(x.totalScore||0),0);
    const totalFrecce = sessioni.reduce((s,x)=>s+countArrowsForSession(x),0);
    const avg = scored.length > 0 ? (totalScore/scored.length).toFixed(0) : '—';
    const bestGaraPts  = sessioni.filter(s=>s.type==='Gara'&&(s.totalScore||0)>0);
    const bestAllPts   = sessioni.filter(s=>s.type==='Allenamento'&&!s.trainingWithoutScore&&(s.totalScore||0)>0);
    const recordGara   = bestGaraPts.length ? Math.max(...bestGaraPts.map(s=>s.totalScore)) : 0;
    const recordAll    = bestAllPts.length  ? Math.max(...bestAllPts.map(s=>s.totalScore))  : 0;

    // Best scores per il badge record
    const bestGara = sessioni.filter(s=>s.type==='Gara'&&(s.totalScore||0)>0);
    const bestAll  = sessioni.filter(s=>s.type==='Allenamento'&&!s.trainingWithoutScore&&(s.totalScore||0)>0);
    const maxGara  = bestGara.length ? Math.max(...bestGara.map(s=>s.totalScore||0)) : 0;
    const maxAll   = bestAll.length  ? Math.max(...bestAll.map(s=>s.totalScore||0))  : 0;

    const sessionList = sessioni.length === 0
        ? `<p style="text-align:center;color:var(--muted);padding:1.5rem">Nessuna sessione registrata.</p>`
        : sessioni.map(s => {
            const isRecord = (s.type==='Gara'&&s.totalScore===maxGara&&maxGara>0) ||
                             (s.type==='Allenamento'&&!s.trainingWithoutScore&&s.totalScore===maxAll&&maxAll>0);
            return `
            <div class="session-card" style="cursor:pointer;${isRecord?'border-color:var(--gold);':''}" onclick="window.asdDettaglioSessione('${s.id}')">
                <div style="display:flex;justify-content:space-between;align-items:flex-start">
                    <div style="flex:1">
                        <div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap">
                            <span class="badge ${s.type==='Gara'?'badge-gold':'badge-blue'}">${s.type||'Allenamento'}${s.trainingWithoutScore?' 🎓':s.quickScore?' ⚡':''}</span>
                            ${isRecord?`<span style="font-size:0.65rem;background:rgba(201,162,39,0.2);color:var(--gold);border:1px solid rgba(201,162,39,0.4);padding:1px 5px;border-radius:8px;font-weight:700">🏆 RECORD</span>`:''}
                        </div>
                        <div style="font-family:'Rajdhani',sans-serif;font-weight:700;margin-top:0.3rem">${fmtDate(s.data)}</div>
                        <div style="font-size:0.75rem;color:var(--muted)">${s.luogo||''} ${s.distanza?'· '+s.distanza:''} ${s.tipoTarga?'· '+s.tipoTarga:''}</div>
                    </div>
                    <div style="text-align:right;flex-shrink:0">
                        ${s.totalScore > 0 ? `<div style="font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:${isRecord?'var(--gold)':'var(--gold-light)'}">${s.totalScore}</div><div style="font-size:0.7rem;color:var(--muted)">${s.turn1Score?'T1:'+s.turn1Score+(s.turn2Score?' T2:'+s.turn2Score:''):''}</div>` : `<div style="color:var(--muted);font-size:0.78rem">${s.trainingWithoutScore?'Tecnico':'—'}</div>`}
                    </div>
                </div>
                ${(s.esercizConsigliati||s.esercizSvolti||s.noteCondizioniFisiche) ? `
                <div style="margin-top:0.5rem;border-top:1px solid var(--border);padding-top:0.4rem;display:flex;flex-direction:column;gap:0.2rem">
                    ${s.esercizConsigliati?`<div style="font-size:0.75rem"><strong style="color:var(--gold)">🎯 Consigliati:</strong> <span style="color:var(--muted)">${s.esercizConsigliati.substring(0,80)}${s.esercizConsigliati.length>80?'…':''}</span></div>`:''}
                    ${s.esercizSvolti?`<div style="font-size:0.75rem"><strong style="color:#5dba94">✅ Svolti:</strong> <span style="color:var(--muted)">${s.esercizSvolti.substring(0,80)}${s.esercizSvolti.length>80?'…':''}</span></div>`:''}
                    ${s.noteCondizioniFisiche?`<div style="font-size:0.75rem"><strong style="color:#5daadc">🩺 Note:</strong> <span style="color:var(--muted)">${s.noteCondizioniFisiche.substring(0,60)}${s.noteCondizioniFisiche.length>60?'…':''}</span></div>`:''}
                </div>` : ''}
            </div>`;
        }).join('');

    render(`
        <button class="btn btn-ghost btn-sm" onclick="window.setView('asdAtleti')" style="margin-bottom:1rem">← Atleti</button>

        <div style="display:flex;align-items:center;gap:0.85rem;margin-bottom:1rem">
            ${atl.fotoBase64
                ? `<img src="${atl.fotoBase64}" style="width:64px;height:64px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;flex-shrink:0">`
                : `<div class="avatar avatar-lg">${initials(atl.nome,atl.cognome)}</div>`}
            <div>
                <div style="font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700">${atl.nome} ${atl.cognome}</div>
                <div style="font-size:0.78rem;color:var(--muted)">${atl.tipoArco||''}</div>
                ${atl.tesseraFitarco ? `<div style="font-size:0.75rem;color:var(--gold)">Fitarco: ${atl.tesseraFitarco}</div>` : ''}
                ${atl.tesseraAltro ? `<div style="font-size:0.75rem;color:var(--muted)">${atl.enteAltro||'Altro'}: ${atl.tesseraAltro}</div>` : ''}
            </div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-bottom:0.75rem">
            <div class="stat-box"><div class="stat-num">${sessioni.length}</div><div class="stat-label">Sessioni</div></div>
            <div class="stat-box"><div class="stat-num">${totalFrecce}</div><div class="stat-label">Frecce</div></div>
            <div class="stat-box"><div class="stat-num">${avg}</div><div class="stat-label">Media</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1rem">
            <div class="stat-box" style="${recordGara>0?'border-color:var(--gold)':''}">
                <div class="stat-num" style="color:var(--gold-light)">${recordGara||'—'}</div>
                <div class="stat-label">🏆 Record Gara</div>
            </div>
            <div class="stat-box" style="${recordAll>0?'border-color:rgba(201,162,39,0.4)':''}">
                <div class="stat-num">${recordAll||'—'}</div>
                <div class="stat-label">🎯 Record Alln.</div>
            </div>
        </div>

        <div class="gold-line"></div>
        <h3 style="font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold);margin-bottom:0.75rem">📋 Sessioni Recenti</h3>
        ${sessionList}
    `);
}

                ${(s.turn1Score||s.turn2Score)?`<div style="font-size:0.75rem;color:var(--text)">T1: ${s.turn1Score||0}${s.turn2Score?' · T2: '+s.turn2Score:''}</div>`:''}

async function sendMessaggio() {
    const dest    = $('msg-dest')?.value;
    const testo   = $('msg-testo')?.value.trim();
    const eserc   = $('msg-eserc')?.value.trim();
    const obTipo  = $('msg-ob-tipo')?.value;
    const obVal   = parseInt($('msg-ob-val')?.value)||0;
    const obTitle = $('msg-ob-title')?.value.trim();
    const obPer   = $('msg-ob-period')?.value||'monthly';
    if (!testo) return showModal('Errore','Scrivi un messaggio.',[{text:'OK'}]);

    const msgData = { destinatari: dest, testo, esercizi: eserc, mittente:'asd', createdAt: serverTimestamp() };
    if (obTipo && obVal > 0) {
        msgData.obiettivo = { type:obTipo, targetValue:obVal, title:obTitle||`Obiettivo: ${obVal}`, period:obPer };
    }
    await addDoc(msgCol(S.asd.id), msgData);

    // Se ci sono esercizi o obiettivo, salvali anche nell'atleta/atleti destinatari
    const destinatari = dest === 'tutti' ? S.atleti.map(a=>a.id) : [dest];
    for (const atletaId of destinatari) {
        // Salva esercizi consigliati come nota nell'atleta (campo 'esercizConsigliatiCoach')
        if (eserc) {
            const atletaRef = doc(db, `${APP_NS}/data/asd/${S.asd.id}/atleti/${atletaId}`);
            await updateDoc(atletaRef, { esercizConsigliatiCoach: eserc, esercizAggiornatiIl: new Date().toISOString().split('T')[0] }).catch(()=>{});
        }
        // Crea obiettivo nel profilo atleta se specificato
        if (obTipo && obVal > 0) {
            const goalsRef = collection(db, `${APP_NS}/data/asd/${S.asd.id}/atleti/${atletaId}/goals`);
            await addDoc(goalsRef, {
                title: obTitle||`Obiettivo dal coach: ${obVal}`,
                type: obTipo, targetValue: obVal, period: obPer,
                completed: false, fromCoach: true,
                createdAt: new Date().toISOString()
            }).catch(()=>{});
        }
    }

    const esito = [eserc ? '✅ Esercizi consigliati salvati' : '', obTipo && obVal ? '🏅 Obiettivo aggiunto all\'atleta' : ''].filter(Boolean).join(' · ');
    showModal('✅ Inviato!', esito ? 'Messaggio inviato. ' + esito : 'Messaggio inviato con successo.', [{text:'OK', fn:()=>window.setView('asdMessaggi')}]);
}
window.sendMessaggio = sendMessaggio;

window.previewLogoFile = function(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) return showModal('Errore','File troppo grande. Max 2MB.',[{text:'OK'}]);
    const reader = new FileReader();
    reader.onload = e => {
        const b64 = e.target.result;
        const wrap = $('logo-preview-wrap');
        wrap.innerHTML = `<img id="logo-preview-img" src="${b64}" style="width:100%;height:100%;object-fit:cover">`;
        wrap._pendingBase64 = b64;
    };
    reader.readAsDataURL(file);
};

window.previewFotoAtleta = function(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) return showModal('Errore','File troppo grande. Max 2MB.',[{text:'OK'}]);
    const reader = new FileReader();
    reader.onload = e => {
        const b64 = e.target.result;
        const prev = $('foto-atleta-preview');
        if (prev) { prev.src = b64; prev.style.display = 'block'; }
        const wrap = $('foto-atleta-wrap');
        if (wrap) wrap._pendingBase64 = b64;
    };
    reader.readAsDataURL(file);
};

window.loginAtletaConPassword = async () => {
    const nomeInput = $('atl-login-nome')?.value.trim().toLowerCase();
    const pwd = $('atl-login-pwd')?.value.trim();
    if (!pwd) return showModal('Errore','Inserisci la password.',[{text:'OK'}]);
    const pwdH = hashPwd(pwd);
    const atleti = S._tempAtleti || [];
    // Cerca atleta: prima per nome+pwd, poi solo per pwd (password univoca)
    let trovato = null;
    if (nomeInput) {
        trovato = atleti.find(a =>
            (a.nome+' '+a.cognome).toLowerCase().includes(nomeInput) && a.pwdHash === pwdH
        );
    }
    if (!trovato) {
        // Prova con solo password
        const matches = atleti.filter(a => a.pwdHash === pwdH);
        if (matches.length === 1) trovato = matches[0];
        else if (matches.length > 1) {
            return showModal('Errore','Più atleti con questa password. Inserisci anche il nome.',[{text:'OK'}]);
        }
    }
    if (!trovato) return showModal('Errore','Credenziali non valide. Riprova.',[{text:'OK'}]);
    S._loginAsd = S._tempAsd;
    S._loginAtleta = trovato;
    window.setView('atletaLogin', {});
};

window.doAtletaLogin = async function() {
    const asd    = S._loginAsd;
    const atleta = S._loginAtleta;
    if (!asd || !atleta) return window.setView('homeLogin');

    const pwd = $('atl-pwd-login')?.value.trim();
    if (!pwd) return showModal('Errore','Inserisci la password.',[{text:'OK'}]);
    if (hashPwd(pwd) !== atleta.pwdHash) return showModal('Errore','Password errata.',[{text:'OK'}]);

    S.role   = 'atleta';
    S.asd    = asd;
    S.atleta = atleta;
    localStorage.setItem('acm_atleta_session', JSON.stringify({ asdId: asd.id, atletaId: atleta.id }));
    buildNav();

async function loadAtletaSessioni() {
    if (!S.asd || !S.atleta) return;
    const snap = await getDocs(query(sessioniCol(S.asd.id), where('archerId','==',S.atleta.id)));
    S.sessioni = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.data||'').localeCompare(a.data||''));
}

function checkDraftSession() {
    const dk = `tk_d_${S.atleta?.id||''}`;
    const draft = localStorage.getItem(dk) || localStorage.getItem('tk_d');
    if (!draft) return;
    try {
        const sv = JSON.parse(draft);
        if (!sv.s) return;
        showModal('⏸️ Sessione in pausa',
            `<p style="color:var(--text);margin-bottom:0.75rem">Hai una sessione interrotta:</p>
            <div style="background:var(--dark3);border-radius:8px;padding:0.6rem;font-size:0.85rem">
                <strong style="color:var(--gold)">${sv.s.type||'Sessione'}</strong> · ${sv.s.data||''}
                <br><span style="color:var(--muted)">${sv.s.luogo||''} · Turno ${sv.t||1}</span>
            </div>`,
            [
                {text:'🗑️ Scarta', cls:'btn-ghost', fn:()=>{ localStorage.removeItem(dk); tkClearDraft(); }},
                {text:'▶ Riprendi', cls:'btn-gold', fn:()=>{
                    TK.session = sv.s; TK.turn = sv.t||1; TK.grid = sv.g;
                    TK.volleyNotes = sv.n||{}; TK.rows = sv.r||10; TK.cols = sv.c||3;
                    TK.format = sv.f; TK.activeCell = sv.a||{row:1,col:1};
                    setHeader(`${TK.session.type==='Gara'?'🏆':'🎯'} ${TK.session.type} · T${TK.turn}`,S.asd?.nome||'');
                    tkRenderScoring();
                }}
            ]
        );
    } catch(e) { localStorage.removeItem(dk); tkClearDraft(); }
}

// Controlla messaggi nuovi e colora il bottone di verde
async function checkNuoviMessaggi() {
    if (!S.asd || !S.atleta) return;
    try {
        const snap = await getDocs(msgCol(S.asd.id));
        const msgs = snap.docs.map(d=>({id:d.id,...d.data()}))
            .filter(m=>m.destinatari==='tutti'||m.destinatari===S.atleta.id);
        const lastSeen = parseInt(localStorage.getItem(`msg_last_${S.atleta.id}`)||'0');
        const nuovi = msgs.filter(m=>(m.createdAt?.seconds||0)*1000 > lastSeen);
        const btn = document.getElementById('menu-msg-btn');
        const sub = document.getElementById('menu-msg-sub');
        if (btn && nuovi.length > 0) {
            btn.style.borderColor = '#3d9970';
            btn.style.background = 'rgba(61,153,112,0.08)';
            if (sub) sub.innerHTML = `<span style="color:#5dba94;font-weight:700">${nuovi.length} nuovo/i messaggio/i</span>`;
        }
    } catch(e) {}
}

const TK = { session:null, turn:1, grid:null, volleyNotes:{}, rows:0, cols:3, format:null, activeCell:{row:1,col:1} };

];
const TK_TR_W=164,TK_TR_H=508,TK_TR_R=80,TK_TR_CX=82;
const TK_TR_CY=[82, 82+TK_TR_R*2+12, 82+(TK_TR_R*2+12)*2];
const TK_RINGS_T=[
    {s:'X',r:3.5,c:'#fef08a'},{s:'10',r:8.0,c:'#fef08a'},{s:'9',r:16.8,c:'#fde047'},

];

if(!window._tkPos) window._tkPos={};

function tkScore(x,y,cfg){
    if(cfg==='tripla'){
        let bd=Infinity,bcy=TK_TR_CY[0];
        TK_TR_CY.forEach(cy=>{const d=Math.hypot(x-TK_TR_CX,y-cy);if(d<bd){bd=d;bcy=cy;}});
        for(const r of TK_RINGS_T) if(bd<=r.r+0.5) return r.s; return 'M';
    }
    const d=Math.hypot(x-170,y-170);
    for(const r of TK_RINGS_S) if(d<=r.r+0.5) return r.s; return 'M';
}
function tkSort(arr){
    const o={'X':0,'10':1,'9':2,'8':3,'7':4,'6':5,'5':6,'4':7,'3':8,'2':9,'1':10,'M':11,'m':11,'':12};
    return arr.sort((a,b)=>(o[a]??12)-(o[b]??12));
}
function tkCalc(grid){
    if(!grid||!grid.length) return{score:0,X:0,Ten:0,Nine:0,fired:0,avg:0,max:0,volleys:[]};
    let tot=0,X=0,Ten=0,Nine=0,fired=0; const volleys=[];
    grid.forEach((row,i)=>{
        const v=row.filter(s=>s!==''&&s!==undefined);
        if(!v.length) return;
        let p=0,vx=0,vt=0,vn=0;
        v.forEach(s=>{const n=s==='X'?10:s==='M'?0:parseInt(s)||0;p+=n;if(s==='X')vx++;else if(s==='10')vt++;else if(n===9)vn++;});
        tot+=p;X+=vx;Ten+=vt;Nine+=vn;fired+=v.length;
        volleys.push({i,v,parz:p,tot,x10:`${vx}-${vt}`,nine:vn});
    });
    return{score:tot,X,Ten,Nine,fired,avg:fired>0?tot/fired:0,max:TK.rows*TK.cols*10,volleys};
}
function tkInitGrid(){
    const f=TK.session?.formatoGara||'30 frecce (3x10)';
    TK.format=f;
    if(f==='72 frecce (6x12)'){TK.rows=12;TK.cols=6;}
    else if(f==='36 frecce (6x6)'){TK.rows=6;TK.cols=6;}
    else{TK.rows=10;TK.cols=3;}
    TK.grid=Array.from({length:TK.rows},()=>Array(TK.cols).fill(''));
    TK.activeCell={row:1,col:1};
}
function tkSave(){try{const dk=`tk_d_${S.atleta?.id||''}`;const d=JSON.stringify({s:TK.session,t:TK.turn,g:TK.grid,n:TK.volleyNotes,r:TK.rows,c:TK.cols,f:TK.format,a:TK.activeCell});localStorage.setItem(dk,d);localStorage.setItem('tk_d',d);}catch(e){}}
function tkClearDraft(){try{localStorage.removeItem(`tk_d_${S.atleta?.id||''}`);tkClearDraft();}catch(e){}}

window.tkKey=(val)=>{
    const {row,col}=TK.activeCell,ri=row-1,ci=col-1;
    if(ri<0||ri>=TK.rows||ci<0||ci>=TK.cols) return;
    if(val==='CANC'){
        if(TK.grid[ri][ci]!=='') TK.grid[ri][ci]='';
        else{let nc=ci-1,nr=ri;if(nc<0){nr=ri-1;nc=TK.cols-1;}if(nr>=0)TK.activeCell={row:nr+1,col:nc+1};}
    } else {
        TK.grid[ri][ci]=val.toUpperCase();
        let nc=ci+1,nr=ri;
        if(nc>=TK.cols){nc=0;nr=ri+1;
            if(TK.grid[ri].filter(s=>s!==''&&s!==undefined).length===TK.cols)TK.grid[ri]=tkSort([...TK.grid[ri]]);}
        if(nr<TK.rows)TK.activeCell={row:nr+1,col:nc+1};
    }
    tkSave();
    if(!TK_OV.active)tkRenderScoring();
};
window.tkCell=(r,c)=>{TK.activeCell={row:r,col:c};tkRenderScoring();};

    let cum=0;
    for(let i=0;i<TK.rows;i++){

        fil.forEach(sc=>{const n=sc==='X'?10:sc==='M'?0:parseInt(sc)||0;p+=n;if(sc==='X')vx++;else if(sc==='10')vt++;else if(n===9)vn++;});
        cum+=p;const hn=!!TK.volleyNotes[i+1];
        tbl+=`<tr style="background:${i%2===0?'var(--dark3)':'var(--dark2)'}">
            <td style="color:var(--gold);font-weight:700">${i+1}</td>

                const act=TK.activeCell.row===i+1&&TK.activeCell.col===ci+1,sc=TK.grid[i][ci];
                return `<td class="score-cell" onclick="window.tkCell(${i+1},${ci+1})" style="${act?'background:var(--gold);color:#000;font-weight:900;':''}${sc==='X'||sc==='10'?'color:#fbbf24;':sc==='M'?'color:#ef4444;':''}">${sc||''}</td>`;
            }).join('')}

            ${isT?`<td style="cursor:pointer;color:var(--gold)" onclick="window.tkNote(${i+1})">${hn?'📝✓':'📝'}</td>`:''}
        </tr>`;
        if(hn&&isT) tbl+=`<tr><td colspan="${TK.cols+5+(isT?1:0)}" style="font-size:0.75rem;color:#93c5fd;font-style:italic;padding:0.2rem 0.5rem">💬 ${TK.volleyNotes[i+1]}</td></tr>`;
    }
    tbl+=`<tr style="background:var(--gold);color:#000;font-weight:900"><td colspan="${2+TK.cols}" style="text-align:right;padding-right:0.5rem">Totale</td><td>${st.score}</td><td>${st.X}-${st.Ten}</td><td>${st.Nine}</td>${isT?'<td></td>':''}</tr>`;
    tbl+=`</tbody></table></div>`;

    // Live stats
    const live=st.fired>0?`<div style="background:linear-gradient(135deg,var(--dark3),var(--dark2));border:2px solid var(--gold);border-radius:12px;padding:0.75rem;margin-bottom:0.75rem">
        <div style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;margin-bottom:0.4rem">📊 Live <span style="color:var(--gold)">(${pct}%)</span></div>

        </div>
        <div style="background:var(--dark);border-radius:6px;overflow:hidden;height:4px"><div style="background:var(--gold);height:100%;width:${pct}%"></div></div>
    </div>`:'';

    // Keypad
    const kp=`<div style="margin-bottom:0.75rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem">

            ${showTarget?`<button onclick="window.tkOvOpen()" style="background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:2px solid #f97316;border-radius:8px;padding:0.35rem 0.75rem;font-weight:700;cursor:pointer;font-size:0.82rem">🎯 Bersaglio</button>`:''}
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.35rem">
            ${TK_KEYPAD.map(v=>`<button onclick="window.tkKey('${v}')" style="min-height:46px;background:var(--dark3);border:1.5px solid var(--border);color:var(--text);border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent" ontouchstart="this.style.background='var(--gold)';this.style.color='#000'" ontouchend="this.style.background='var(--dark3)';this.style.color='var(--text)'">${v}</button>`).join('')}
        </div>
    </div>`;

    // Notes
    const notes=isT?`<div class="form-section">
        <label class="form-label">🩺 Note Fisiche</label>
        <textarea class="inp" rows="2" placeholder="Stanchezza, dolori, meteo..." oninput="TK.session.noteCondizioniFisiche=this.value">${s.noteCondizioniFisiche||''}</textarea>
        <label class="form-label" style="margin-top:0.5rem">✅ Esercizi Svolti</label>
        <textarea class="inp" rows="2" placeholder="Cosa hai praticato..." oninput="TK.session.esercizSvolti=this.value">${s.esercizSvolti||''}</textarea>
    </div>`:`<div class="form-section">
        <label class="form-label">📝 Note Pre-Gara</label>
        <textarea class="inp" rows="2" oninput="TK.session.notePreGara=this.value">${s.notePreGara||''}</textarea>
        <label class="form-label" style="margin-top:0.5rem">🏆 Note Post-Gara</label>

        <textarea class="inp" rows="2" oninput="TK.session.noteCondizioniFisiche=this.value">${s.noteCondizioniFisiche||''}</textarea>

                <div class="stat-box"><div class="stat-num">${t1?.X||0}-${t1?.Ten||0}</div><div class="stat-label">X-10</div></div>
                <div class="stat-box"><div class="stat-num">${t1?.avg?.toFixed(1)||'—'}</div><div class="stat-label">Media</div></div>
            </div>
        </div>`;
    }

    render(`

}

                        noteCondizioniFisiche:s.noteCondizioniFisiche||'',notePreGara:s.notePreGara||'',
                        notePostGara:s.notePostGara||'',trainingWithoutScore:false,quickScore:false,
                        turn1:{summary:{score:t1.score,X:t1.X||0,Ten:t1.Ten||0,Nine:t1.Nine||0,fired:t1.fired||0,avg:t1.avg||0},
                               grid:(s.turn1?.grid||[]).map(r=>JSON.stringify(r)),volleyNotes:s.turn1?.volleyNotes||{}},

                    });
                    tkClearDraft();

window.tkOvOpen=()=>{
    if(!TK.session||!TK.grid) return;

    TK_OV.active=true;

    tkOvRender();
    document.getElementById('target-overlay').style.display='block';
};
window.closeTargetOverlay=()=>{
    TK_OV.active=false;
    document.getElementById('target-overlay').style.display='none';
    const m=document.getElementById('test-magnifier');if(m)m.style.display='none';
    tkRenderScoring();
};
function tkOvRender(){
    const cfg=TK_OV.cfg,isTr=cfg==='tripla';
    const st=tkCalc(TK.grid),total=TK.rows*TK.cols,rem=total-st.fired;
    const pct=total>0?Math.round(st.fired/total*100):0;
    const ri=TK.activeCell.row-1,ci=TK.activeCell.col-1;
    const row=TK.grid[ri]||[],cur=[...row.filter(s=>s!==''&&s!==undefined)];
    const sorted=[...cur].sort((a,b)=>{const o={'X':11,'M':0};return(o[b]??parseInt(b)??0)-(o[a]??parseInt(a)??0);});
    const lc=`<div style="display:flex;flex-direction:column;align-items:center;gap:5px;min-width:44px">
        <p style="font-size:9px;color:#6b7280;text-transform:uppercase;writing-mode:vertical-lr;transform:rotate(180deg)">V.${ri+1}</p>
        ${Array(TK.cols).fill(0).map((_,i)=>{const sc=sorted[i];
            if(sc){const st2=sc==='X'||sc==='10'?'background:#eab308;color:#000':sc==='M'?'background:#dc2626;color:#fff':parseInt(sc)>=7?'background:#ef4444;color:#fff':parseInt(sc)>=5?'background:#3b82f6;color:#fff':'background:#4b5563;color:#fff';
                return `<div style="width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:900;font-size:15px;${st2}">${sc}</div>`;}
            return `<div style="width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#1f2937;border:1px solid #374151;color:#6b7280;font-size:12px">·</div>`;
        }).join('')}
        <div style="font-size:11px;color:#fdb927;font-weight:bold">${st.score}</div>
    </div>`;
    const cS=isTr?`width:${TK_TR_W}px;height:${TK_TR_H}px;border-radius:12px`:`width:340px;height:340px;border-radius:50%`;
    const done=st.fired>=total;
    const cont=document.getElementById('target-overlay-content');
    if(!cont)return;
    cont.innerHTML=`
        <div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:12px">
            ${lc}
            <div id="tk-ov-canvas" style="position:relative;border:2px solid #334155;touch-action:none;flex-shrink:0;overflow:hidden;${cS}"></div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:44px">
                <p style="font-size:9px;color:#6b7280">Mirino</p>
                <div id="tk-ov-live" style="font-size:2rem;font-weight:900;color:#fff">—</div>
                <p style="font-size:9px;color:#6b7280;margin-top:6px">Rimaste</p>
                <div style="font-size:1rem;font-weight:700;color:#fdb927">${rem>0?rem:done?'✓':'—'}</div>
            </div>
        </div>
        ${pct>0?`<div style="background:#1f2937;border-radius:6px;overflow:hidden;height:5px;margin-bottom:6px"><div style="background:#fdb927;height:100%;width:${pct}%"></div></div><div style="text-align:center;font-size:11px;color:#fdb927;margin-bottom:6px">${st.fired}/${total} · Media: ${st.fired>0?st.avg.toFixed(2):'—'}</div>`:''}
        <div style="display:flex;gap:8px;margin-bottom:8px">
            <button onclick="window.tkOvMiss()" style="flex:1;padding:10px;background:#374151;color:#fff;font-weight:700;border-radius:10px;cursor:pointer">M Mancata</button>
            <button onclick="window.tkOvUndo()" style="flex:1;padding:10px;background:#374151;color:#fff;font-weight:700;border-radius:10px;cursor:pointer">↩ Annulla</button>
        </div>
        ${done?`<div style="background:#064e3b;border:2px solid #10b981;border-radius:10px;padding:10px;text-align:center">
            <p style="color:#10b981;font-weight:700;margin-bottom:4px">✅ Turno completato! (${st.score} pt)</p>
            <button onclick="window.closeTargetOverlay()" style="background:#10b981;color:#000;font-weight:700;padding:8px 20px;border-radius:8px;cursor:pointer">← Torna al Segnapunti</button>
        </div>`:''}
    `;
    requestAnimationFrame(()=>{
        const cv=document.getElementById('tk-ov-canvas');
        if(!cv)return;
        tkOvDrawTarget(cv,cfg);
        tkOvSetupPtr(cv);
        tkOvBuildMag(cfg);
    });
    const si=document.getElementById('overlay-score-info');
    if(si)si.textContent=`Tot: ${st.score}`;
}
function tkOvDrawTarget(canvas,cfg){
    const isTr=cfg==='tripla';
    canvas.querySelectorAll('.tk-r,.tk-d,.tk-bg').forEach(d=>d.remove());
    if(isTr){
        const bg=document.createElement('div');bg.className='tk-bg';bg.style.cssText='position:absolute;inset:0;background:#1e293b;border-radius:10px';canvas.appendChild(bg);
        TK_TR_CY.forEach(cy=>[...TK_RINGS_T].reverse().forEach(r=>{const el=document.createElement('div');el.className='tk-r';el.style.cssText=`position:absolute;border-radius:50%;width:${r.r*2}px;height:${r.r*2}px;background:${r.c};border:0.8px solid rgba(0,0,0,0.4);left:${TK_TR_CX-r.r}px;top:${cy-r.r}px`;canvas.appendChild(el);}));
    } else {
        [...TK_RINGS_S].reverse().forEach(r=>{const el=document.createElement('div');el.className='tk-r';el.style.cssText=`position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;width:${r.r*2}px;height:${r.r*2}px;background:${r.c};border:0.5px solid rgba(0,0,0,0.3)`;canvas.appendChild(el);});
    }
    const ri=TK.activeCell.row-1;
    TK.grid.forEach((row,r)=>row.forEach((sc,c)=>{
        if(!sc)return;
        const pos=window._tkPos[`${r}_${c}`];
        if(pos&&(pos.x||pos.y)){const d=document.createElement('div');d.className='tk-d';d.style.cssText=`position:absolute;width:7px;height:7px;background:${r<ri?'#94a3b8':'#ff4500'};border:1.5px solid rgba(255,255,255,0.9);border-radius:50%;transform:translate(-50%,-50%);left:${pos.x}px;top:${pos.y}px;pointer-events:none`;canvas.appendChild(d);}
    }));
}
function tkOvBuildMag(cfg){
    const isTr=cfg==='tripla',W=isTr?TK_TR_W:340,H=isTr?TK_TR_H:340;
    const off=document.createElement('canvas');off.width=W;off.height=H;
    const ctx=off.getContext('2d');
    const rings=isTr?TK_RINGS_T:TK_RINGS_S;
    const dT=(cx,cy)=>[...rings].reverse().forEach(r=>{ctx.beginPath();ctx.arc(cx,cy,r.r,0,Math.PI*2);ctx.fillStyle=r.c;ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=0.5;ctx.stroke();});
    if(isTr){ctx.fillStyle='#1e293b';ctx.fillRect(0,0,W,H);TK_TR_CY.forEach(cy=>dT(TK_TR_CX,cy));}
    else{ctx.fillStyle='#374151';ctx.beginPath();ctx.arc(170,170,170,0,Math.PI*2);ctx.fill();dT(170,170);}
    const mag=document.getElementById('test-magnifier');
    if(mag)mag.style.backgroundImage=`url('${off.toDataURL()}')`;
}
let _tkPt=false,_tkSc=null,_tkX=0,_tkY=0;
function tkOvSetupPtr(canvas){
    if(canvas._tkA)return;canvas._tkA=true;
    canvas.addEventListener('pointerdown',e=>{if(!TK_OV.active)return;e.preventDefault();_tkPt=true;_tkSc=null;tkOvMove(e,canvas);},{passive:false});
}
if(!window._tkPL){
    window._tkPL=true;
    window.addEventListener('pointermove',e=>{if(!_tkPt||!TK_OV.active)return;const cv=document.getElementById('tk-ov-canvas');if(cv)tkOvMove(e,cv);});
    window.addEventListener('pointerup',e=>{
        if(!_tkPt||!TK_OV.active)return;_tkPt=false;
        const m=document.getElementById('test-magnifier');if(m)m.style.display='none';
        if(!_tkSc)return;
        const ri=TK.activeCell.row-1,ci=TK.activeCell.col-1;
        window._tkPos[`${ri}_${ci}`]={x:_tkX,y:_tkY};
        window.tkKey(_tkSc);tkOvRender();
    });
}
function tkOvMove(e,canvas){
    const rect=canvas.getBoundingClientRect();
    const cx=e.clientX,cy=e.clientY;
    const cfg=TK_OV.cfg,isTr=cfg==='tripla';
    const cW=isTr?TK_TR_W:340,cH=isTr?TK_TR_H:340;
    const x=Math.max(0,Math.min(cW,cx-rect.left-2)),y=Math.max(0,Math.min(cH,cy-rect.top-2));
    _tkX=x;_tkY=y;_tkSc=tkScore(x,y,cfg);
    const Z=4,MR=110,LF=270;
    const mag=document.getElementById('test-magnifier');
    if(mag){mag.style.display='block';mag.style.left=(cx-MR)+'px';mag.style.top=(cy-LF)+'px';mag.style.backgroundSize=`${cW*Z}px ${cH*Z}px`;mag.style.backgroundPosition=`${MR-x*Z}px ${MR-y*Z}px`;}
    const lv=document.getElementById('tk-ov-live');
    if(lv){lv.textContent=_tkSc;lv.style.color=_tkSc==='X'||_tkSc==='10'?'#fbbf24':_tkSc==='M'?'#ef4444':'#ffffff';}
}
window.tkOvMiss=()=>{const ri=TK.activeCell.row-1,ci=TK.activeCell.col-1;window._tkPos[`${ri}_${ci}`]={x:0,y:0};window.tkKey('M');tkOvRender();};
window.tkOvUndo=()=>{window.tkKey('CANC');tkOvRender();};

    const garaList = S.sessioni.filter(s=>s.type==='Gara'&&(s.totalScore||0)>0);
    const allList = S.sessioni.filter(s=>!s.trainingWithoutScore&&(s.totalScore||0)>0);
    const bestScore = allList.length > 0 ? Math.max(...allList.map(s=>s.totalScore||0)) : 0;
    const sessCount = S.sessioni.length;
    const garaCount = garaList.length;
    const allCount = S.sessioni.filter(s=>s.type==='Allenamento').length;

    const anni = [...new Set(S.sessioni.map(s=>s.data?.substring(0,4)).filter(Boolean))].sort().reverse();

    const sessList = sessioniFiltrate.length === 0
        ? `<p style="text-align:center;color:var(--muted);padding:2rem">Nessuna sessione registrata.</p>`
        : sessioniFiltrate.map(s => `

                <div style="display:flex;justify-content:space-between;align-items:flex-start">
                    <div>
                        <span class="badge ${s.type==='Gara'?'badge-gold':'badge-blue'}">${s.type||'Allenamento'}${s.trainingWithoutScore?' 🎓':s.quickScore?' ⚡':''}</span>
                        <div style="font-family:'Rajdhani',sans-serif;font-weight:700;margin-top:0.3rem">${fmtDate(s.data)}</div>
                        <div style="font-size:0.78rem;color:var(--muted)">${s.luogo||''} ${s.distanza?'· '+s.distanza:''} ${s.tipoTarga?'· '+s.tipoTarga:''}</div>
                    </div>
                    ${s.totalScore > 0 ? `<div style="text-align:right"><div style="font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--gold-light)">${s.totalScore}</div><div style="font-size:0.72rem;color:var(--muted)">${s.turn1Score?'T1:'+s.turn1Score+(s.turn2Score?' T2:'+s.turn2Score:''):''}</div></div>` : `<div style="font-size:0.78rem;color:var(--muted)">${s.trainingWithoutScore?'Tecnico':'Solo note'}</div>`}
                </div>
            </div>
        `).join('');

    render(`
        <button class="btn btn-ghost btn-sm" onclick="window.setView('atletaMenu')" style="margin-bottom:1rem">← Menu</button>
        <div style="display:flex;gap:0.4rem;margin-bottom:0.75rem;flex-wrap:wrap">

                <option value="" ${!filtroTipo?'selected':''}>Tutti i tipi</option>
                <option value="Allenamento" ${filtroTipo==='Allenamento'?'selected':''}>Allenamento</option>
                <option value="Gara" ${filtroTipo==='Gara'?'selected':''}>Gara</option>
                <option value="tecnico" ${filtroTipo==='tecnico'?'selected':''}>Tecnico 🎓</option>
            </select>
            <select class="inp" style="flex:1;min-width:80px" onchange="window._filtroAnno=this.value;renderAtletaDati()">

// ── AUTO-RESTORE SESSION ─────────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
async function tryRestoreSession() {
    // Try ASD session first
    const asdSess = JSON.parse(localStorage.getItem('acm_asd_session')||'null');
    if (asdSess?.id) {
        await loadAllAsd();
        const found = S.allAsd.find(a=>a.id===asdSess.id);
        if (found) {
            S.role = 'asd'; S.asd = found;
            await loadAtleti();
            buildNav();
            window.setView('asdDashboard');
            return true;
        } else { localStorage.removeItem('acm_asd_session'); }
    }
    // Try atleta session
    const atlSess = JSON.parse(localStorage.getItem('acm_atleta_session')||'null');
    if (atlSess?.asdId && atlSess?.atletaId) {
        await loadAllAsd();
        const asd = S.allAsd.find(a=>a.id===atlSess.asdId);
        if (asd) {
            S.asd = asd;
            const snap = await getDocs(atletiCol(asd.id));
            const atl = snap.docs.map(d=>({id:d.id,...d.data()})).find(a=>a.id===atlSess.atletaId);
            if (atl) {
                S.role = 'atleta'; S.atleta = atl;
                buildNav();
                await loadAtletaSessioni();
                window.setView('atletaMenu');
                return true;
            }
        }
        localStorage.removeItem('acm_atleta_session');
    }
    return false;
}

// ── DETTAGLIO SESSIONE ──────────────────────────────────────────────────────
async function renderDettaglioSessione(params) {
    const s = params?.sessione || S._detailSession;
    if (!s) return window.setView('atletaDati');
    S._detailSession = s;
    setHeader(s.type === 'Gara' ? '🏆 Gara' : '🎯 Allenamento', fmtDate(s.data));

    const isTec = !!s.trainingWithoutScore;
    const isQS  = !!s.quickScore && !isTec;

    function deserializeGrid(turn) {
        if (!turn || !turn.grid) return [];
        return turn.grid.map(r => Array.isArray(r) ? r : (() => { try { return JSON.parse(r); } catch(e) { return []; } })());
    }
    function calcVolley(row, cumTot) {
        const v = row.filter(sc => sc !== '' && sc !== undefined);
        let p = 0, vx = 0, vt = 0, vn = 0;
        v.forEach(sc => { const n = sc==='X'?10:sc==='M'?0:parseInt(sc)||0; p+=n; if(sc==='X')vx++; else if(sc==='10')vt++; else if(n===9)vn++; });
        return { scores: v, parz: p, tot: cumTot+p, x10:`${vx}-${vt}`, nine: vn };
    }
    function renderGrid(turn, titolo) {
        if (!turn) return '';
        const grid = deserializeGrid(turn);
        const filled = grid.filter(r => r && r.some(sc => sc !== '' && sc !== undefined));
        if (!filled.length) return '';
        const notes = turn.volleyNotes || {};
        let cum = 0;
        const volleys = filled.map(r => { const v = calcVolley(r, cum); cum = v.tot; return v; });
        const numCols = Math.max(...volleys.map(v => v.scores.length), 1);
        let html = `<div style="margin-top:1rem"><div style="font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold);margin-bottom:0.4rem">${titolo}</div>
        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
        <table class="score-tbl w-full border-collapse" style="min-width:300px"><thead><tr>
            <th>Vol.</th>${Array(numCols).fill(0).map((_,i)=>`<th>${i+1}</th>`).join('')}
            <th>Parz</th><th>Tot</th><th>X-10</th><th>9</th>
        </tr></thead><tbody>`;
        volleys.forEach((v, i) => {
            const padded = [...v.scores]; while(padded.length < numCols) padded.push('');
            const hasNote = notes[i+1];
            html += `<tr style="background:${i%2===0?'var(--dark3)':'var(--dark2)'}">
                <td style="color:var(--gold);font-weight:700">${i+1}${hasNote?' 📝':''}</td>
                ${padded.map(sc=>`<td style="${sc==='X'||sc==='10'?'color:#fbbf24;font-weight:700':sc==='M'?'color:#ef4444':''}">${sc||''}</td>`).join('')}
                <td style="font-weight:700">${v.parz}</td><td style="font-weight:700">${v.tot}</td>
                <td style="color:var(--gold)">${v.x10}</td><td>${v.nine}</td>
            </tr>`;
            if (hasNote) html += `<tr><td colspan="${numCols+5}" style="font-size:0.75rem;color:#93c5fd;font-style:italic;padding:0.2rem 0.5rem">💬 ${notes[i+1]}</td></tr>`;
        });
        const sm = turn.summary || {};
        html += `<tr style="background:var(--gold);color:#000;font-weight:900">
            <td colspan="${1+numCols+1}" style="text-align:right;padding-right:0.4rem">Totale</td>
            <td>${sm.score||0}</td><td>${sm.X||0}-${sm.Ten||0}</td><td>${sm.Nine||0}</td>
        </tr></tbody></table></div></div>`;
        return html;
    }

    const infoItem = (label, val) => val ? `<div><strong style="color:var(--gold)">${label}</strong> <span style="color:var(--text)">${val}</span></div>` : '';
    const noteBlock = (emoji, color, label, text) => !text ? '' : `
        <div class="form-section" style="border-left:4px solid ${color}">
            <div style="font-weight:700;color:${color};margin-bottom:0.35rem">${emoji} ${label}</div>
            <div style="color:var(--text);white-space:pre-wrap;font-size:0.88rem">${text}</div>
        </div>`;

    const hasTurn2 = s.turn2 && s.turn2.summary && (s.turn2.summary.score > 0 || s.turn2.summary.fired > 0);
    const sid = s.id || s.docId || '';

    render(`
        <button class="btn btn-ghost btn-sm" onclick="window.setView('atletaDati')" style="margin-bottom:1rem">← I Miei Dati</button>

        <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:1rem;flex-wrap:wrap">
            <span class="badge ${s.type==='Gara'?'badge-gold':'badge-blue'}">${s.type}${isTec?' 🎓':isQS?' ⚡':''}</span>
            <span style="font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700">${fmtDate(s.data)}</span>
            <span style="font-size:0.78rem;color:var(--muted)">${s.luogo||''}</span>
        </div>

        ${!isTec&&s.totalScore>0 ? `
        <div style="text-align:center;background:linear-gradient(135deg,var(--dark3),var(--dark2));border:2px solid var(--gold);border-radius:14px;padding:1.2rem;margin-bottom:1rem">
            <div style="font-family:'Rajdhani',sans-serif;font-size:3rem;font-weight:900;color:var(--gold-light)">${s.totalScore}</div>
            <div style="font-size:0.75rem;color:var(--muted);margin-bottom:0.3rem">PUNTEGGIO TOTALE</div>
            ${(s.turn1Score||s.turn2Score) ? `<div style="font-size:0.85rem;color:var(--text)">T1: <strong>${s.turn1Score||0}</strong>${s.turn2Score?' · T2: <strong>'+s.turn2Score+'</strong>':''}</div>` : ''}
            ${s.totalX!=null ? `<div style="font-size:0.82rem;color:var(--gold);margin-top:0.2rem">X: ${s.totalX} · 10: ${s.totalTen||0} · 9: ${s.totalNine||0}${s.totalAverage?' · Media: '+parseFloat(s.totalAverage).toFixed(2):''}</div>` : ''}
        </div>` : ''}

        <div class="form-section">
            <div style="font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold);margin-bottom:0.5rem">ℹ️ Informazioni</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.35rem;font-size:0.84rem">
                ${infoItem('📍 Luogo:', s.luogo)}
                ${infoItem('🏠', s.tipoLuogo)}
                ${infoItem('📏 Distanza:', s.distanza)}
                ${infoItem('🎯 Targa:', s.tipoTarga)}
                ${infoItem('📋 Formato:', s.formatoGara)}
                ${infoItem('🏹 Arco:', s.tipoArco)}
                ${s.frecceAggiuntive>0 ? infoItem('🪃 Frecce tirate:', s.frecceAggiuntive) : ''}
                ${s.frecceProgrammate>0 ? infoItem('🪃 Programmate:', s.frecceProgrammate) : ''}
            </div>
        </div>

        ${noteBlock('🎯','var(--gold)','Esercizi Consigliati', s.esercizConsigliati)}
        ${noteBlock('✅','#3d9970','Esercizi Svolti', s.esercizSvolti||s.trainingContent)}
        ${noteBlock('🩺','#2980b9','Note e Condizioni Fisiche', s.noteCondizioniFisiche)}
        ${noteBlock('📝','#e5a400','Note Pre-Gara', s.notePreGara)}
        ${noteBlock('🏆','#3d9970','Note Post-Gara', s.notePostGara)}
        ${s.note && !s.noteCondizioniFisiche ? noteBlock('📝','var(--muted)','Note', s.note) : ''}

        ${!isTec && !isQS && (s.turn1||s.turn2) ? `
        <div class="gold-line"></div>
        <div style="font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold);margin-bottom:0.5rem">📋 Segnapunti Dettagliato</div>
        ${renderGrid(s.turn1, 'Primo Turno')}
        ${hasTurn2 ? renderGrid(s.turn2, 'Secondo Turno') : ''}
        ` : ''}

        <div style="margin-top:1.5rem">
            <button class="btn btn-danger btn-full" onclick="window.eliminaSessione('${sid}','${fmtDate(s.data)}')">🗑️ Elimina Sessione</button>
        </div>
    `);
}

    setHeader('📅 Calendario', S.atleta?.nome||'');

window._calNav = (d) => {
    window._calState.m += d;
    if (window._calState.m > 11) { window._calState.m = 0; window._calState.y++; }
    if (window._calState.m < 0)  { window._calState.m = 11; window._calState.y--; }
    window._calRender();
};
const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
window._calRender = () => {
    const { m, y } = window._calState;
    const titleEl = document.getElementById('cal-title');
    if (titleEl) titleEl.textContent = `${MESI[m]} ${y}`;
    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const todayStr = new Date().toISOString().split('T')[0];
    const byDay = {};
    S.sessioni.forEach(s => {
        const dd = new Date(s.data + 'T00:00');
        if (dd.getMonth() === m && dd.getFullYear() === y) {
            const day = dd.getDate();
            if (!byDay[day]) byDay[day] = [];
            byDay[day].push(s);
        }
    });
    let grid = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">`;
    for (let i = 0; i < firstDay; i++) grid += `<div style="min-height:56px;background:var(--dark3);border-radius:6px;opacity:0.3"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = dateStr === todayStr;
        const sessions = byDay[d] || [];
        const dots = sessions.slice(0,3).map(ss => {
            const col = ss.type==='Gara'?'#f97316':ss.trainingWithoutScore?'#a78bfa':'#3b82f6';
            return `<div style="height:4px;border-radius:2px;background:${col};margin-bottom:1px"></div>`;
        }).join('');
        const frecce = sessions.reduce((sum,ss) => sum+(parseInt(ss.frecceAggiuntive)||0), 0);
        grid += `<div onclick="${sessions.length>0?`window._calDay('${dateStr}')`:''}" style="min-height:56px;background:${isToday?'rgba(201,162,39,0.15)':'var(--dark3)'};border:${isToday?'2px solid var(--gold)':'1px solid var(--border)'};border-radius:6px;padding:4px;cursor:${sessions.length>0?'pointer':'default'};transition:border-color 0.15s" ${sessions.length>0?'onmouseover="this.style.borderColor=\'var(--gold)\'" onmouseout="this.style.borderColor=\'var(--border)\'"':''}>
            <div style="font-size:0.78rem;font-weight:700;color:${isToday?'var(--gold)':'var(--text)'}">${d}</div>
            ${dots}${frecce>0?`<div style="font-size:0.62rem;color:#4ade80">${frecce}🪃</div>`:''}
        </div>`;
    }
    grid += `</div>`;
    const gridEl = document.getElementById('cal-grid');
    if (gridEl) gridEl.innerHTML = grid;
    const mSess = S.sessioni.filter(ss => { const dd=new Date(ss.data+'T00:00'); return dd.getMonth()===m&&dd.getFullYear()===y; });
    const gare = mSess.filter(ss=>ss.type==='Gara');
    const bestScore = gare.length > 0 ? Math.max(...gare.map(ss=>ss.totalScore||0)) : 0;
    const totFrecce = mSess.reduce((sum,ss)=>sum+(parseInt(ss.frecceAggiuntive)||0),0);
    const statsEl = document.getElementById('cal-stats');
    if (statsEl) statsEl.innerHTML = mSess.length > 0 ? `
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.4rem">
            <div class="stat-box"><div class="stat-num">${mSess.length}</div><div class="stat-label">Sessioni</div></div>
            <div class="stat-box"><div class="stat-num">${gare.length}</div><div class="stat-label">Gare</div></div>
            <div class="stat-box"><div class="stat-num">${bestScore||'—'}</div><div class="stat-label">Best</div></div>
            <div class="stat-box"><div class="stat-num">${totFrecce}</div><div class="stat-label">Frecce</div></div>
        </div>` : `<p style="text-align:center;color:var(--muted);font-size:0.85rem">Nessuna sessione in ${MESI[m]} ${y}</p>`;
    const sessEl = document.getElementById('cal-sessions');
    if (sessEl && mSess.length > 0) {
        const sorted = [...mSess].sort((a,b)=>b.data.localeCompare(a.data));
        sessEl.innerHTML = `<div class="gold-line"></div>
            <div style="font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold);margin-bottom:0.5rem">📋 Sessioni di ${MESI[m]}</div>
            ${sorted.map(ss=>`<div class="session-card" onclick="window.apriDettaglio('${ss.id||ss.docId||''}')" style="cursor:pointer;margin-bottom:0.5rem">
                <div style="display:flex;justify-content:space-between;align-items:center">
                    <div>
                        <span class="badge ${ss.type==='Gara'?'badge-gold':'badge-blue'}" style="font-size:0.68rem">${ss.type}${ss.trainingWithoutScore?' 🎓':ss.quickScore?' ⚡':''}</span>
                        <span style="font-family:'Rajdhani',sans-serif;font-weight:700;margin-left:0.4rem">${fmtDate(ss.data)}</span>
                        <div style="font-size:0.73rem;color:var(--muted)">${ss.luogo||''} ${ss.distanza?'· '+ss.distanza:''}</div>
                    </div>
                    ${ss.totalScore>0?`<div style="font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;color:var(--gold-light)">${ss.totalScore}</div>`:
                    ss.trainingWithoutScore?`<div style="font-size:0.73rem;color:var(--muted)">Tecnico</div>`:''}
                </div>
            </div>`).join('')}`;
    } else if (sessEl) sessEl.innerHTML = '';
};
window._calDay = (dateStr) => {
    const daySess = S.sessioni.filter(ss => ss.data === dateStr);
    if (!daySess.length) return;
    const dd = new Date(dateStr+'T00:00');
    showModal(`📅 ${dd.getDate()} ${MESI[dd.getMonth()]} ${dd.getFullYear()}`,
        `<div style="display:flex;flex-direction:column;gap:0.5rem">
        ${daySess.map(ss=>`<div onclick="window.apriDettaglio('${ss.id||ss.docId||''}');closeModal()" style="background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:0.6rem;cursor:pointer">
            <div style="font-weight:700;color:var(--text)">${ss.type}${ss.trainingWithoutScore?' 🎓':ss.quickScore?' ⚡':''}</div>
            <div style="font-size:0.8rem;color:var(--gold)">${ss.trainingWithoutScore?'Tecnico':ss.totalScore+' pt'} · ${ss.distanza||'-'} · ${ss.tipoTarga||'-'}</div>
            <div style="font-size:0.73rem;color:var(--muted)">${ss.luogo||''}</div>
        </div>`).join('')}
        </div>`, [{text:'Chiudi', cls:'btn-ghost'}]);
};

// ── HELPER: conteggio frecce per sessione ───────────────────────────────────
function countArrowsForSession(s) {
    const extra = parseInt(s.frecceAggiuntive)||0;
    if (s.trainingWithoutScore) return extra;
    // Frecce dal formato (turni standard) se non c'è griglia dettagliata
    const fmtMap = {'30 frecce (3x10)':30,'36 frecce (6x6)':36,'72 frecce (6x12)':72};
    const fmtArrows = fmtMap[s.formatoGara] || 0;
    if (s.quickScore) {
        // Quick score: usa il formato per calcolare le frecce per turno
        const turni = s.turn2Score>0 ? 2 : 1;
        return fmtArrows * turni + extra;
    }
    // Con segnapunti: usa le frecce realmente tirate dai turni
    const t1 = s.turn1?.summary?.fired || 0;
    const t2 = s.turn2?.summary?.fired || 0;
    if (t1 > 0 || t2 > 0) return t1 + t2 + extra;
    // Fallback: calcola dal formato (turni effettuati)
    const turni = s.turn2Score>0 ? 2 : (s.totalScore>0 ? 1 : 0);
    return fmtArrows * turni + extra;
}
function fmtDuration(min) {
    if (!min) return '—';
    const h=Math.floor(min/60), m=Math.round(min%60);
    return h>0?`${h}h ${m}min`:`${m} min`;
}

function calcGoalProgress(goal, sessioni) {
    const now = new Date();
    let start, end;
    if (goal.period === 'weekly') {
        const dow = now.getDay();
        start = new Date(now); start.setDate(now.getDate() - (dow===0?6:dow-1)); start.setHours(0,0,0,0);
        end = new Date(start); end.setDate(start.getDate()+6); end.setHours(23,59,59,999);
    } else {
        start = new Date(now.getFullYear(), now.getMonth(), 1);
        end = new Date(now.getFullYear(), now.getMonth()+1, 0, 23,59,59,999);
    }
    const ss = start.toISOString().split('T')[0], se = end.toISOString().split('T')[0];
    const rel = sessioni.filter(s => s.data >= ss && s.data <= se);
    let current = 0;
    if (goal.type==='score') {
        const match = rel.filter(s=>s.distanza===goal.distanza&&s.tipoTarga===goal.tipoTarga&&!s.trainingWithoutScore);
        current = match.length>0?Math.max(...match.map(s=>s.totalScore||0)):0;
    } else if (goal.type==='arrows') {
        current = rel.reduce((sum,s)=>sum+countArrowsForSession(s),0);
    } else if (goal.type==='sessions') {
        current = rel.length;
    } else if (goal.type==='training') {
        current = rel.filter(s=>s.type==='Allenamento').length;
    }
    return {current, target:goal.targetValue};
}
